<!DOCTYPE html>

<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Leads</title>

</head>
<style>
    body {
        margin: 0;
        font-family: Arial;
        background: #f5f5f5;
    }

    header {
        background: #2c3e50;
        color: white;
        padding: 15px 20px;
        font-size: 18px;
    }

    .container {
        padding: 20px;
    }

    .lead {
        background: white;
        padding: 15px;
        margin-bottom: 10px;
        border-radius: 8px;
        box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .lead strong {
        font-size: 16px;
        color: #2c3e50;
    }

    .lead p {
        margin: 5px 0;
        color: #555;
        font-size: 14px;
    }

    .btn-voltar {
        display: inline-block;
        margin-bottom: 15px;
        padding: 10px 15px;
        background: #2c3e50;
        color: white;
        text-decoration: none;
        border-radius: 6px;
    }

    .btn-voltar:hover {
        background: #1a252f;
    }
</style>

</head>

<body>

<header>
    📋 Lista de Leads
</header>

<div class="container">

    <a href="agenda.html" class="btn-voltar">← Voltar para Agenda</a>

    <div id="lista-leads"></div>

</div>

<script>

    function carregarLeads() {
        fetch("http://localhost:8080/api/leads")
            .then(res => res.json())
            .then(data => {

                const lista = document.getElementById("lista-leads")
                lista.innerHTML = ""

                if (data.length === 0) {
                    lista.innerHTML = "<p>Nenhum lead encontrado.</p>"
                    return
                }

                data.forEach(lead => {

                    const div = document.createElement("div")
                    div.classList.add("lead")

                    div.innerHTML = `
                        <strong>${lead.nome}</strong>
                        <p>📞 ${lead.telefone}</p>
                        <p>📧 ${lead.email}</p>
                        <p>💬 ${lead.mensagem}</p>
                    `

                    lista.appendChild(div)
                })
            })
            .catch(err => {
                console.error("Erro ao carregar leads:", err)
            })
    }

    carregarLeads()

</script>

</body>

</html>
