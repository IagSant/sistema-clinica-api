<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Agenda Profissional</title>

    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css" rel="stylesheet">

    <style>
        #menu-btn {
            position: relative;
            font-size: 20px;
            cursor: pointer;
            margin-right: 10px;
            z-index: 10001;
        }

        #menu-lateral {
            position: fixed;
            top: 0;
            left: -220px;
            width: 220px;
            height: 100%;
            background: #2c3e50;
            color: white;
            padding-top: 60px;
            transition: 0.3s;
            z-index: 9999;
        }

        #menu-lateral.show {
            left: 0;
        }

        #menu-lateral ul {
            list-style: none;
            padding: 0;
        }

        #menu-lateral li {
            padding: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            cursor: pointer;
        }

        #menu-lateral li:hover {
            background: #34495e;
        }

        .popup {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: 0.3s;
            z-index: 9999;
        }

        .popup.show {
            opacity: 1;
            pointer-events: all;
        }

        .popup-content {
            background: white;
            padding: 25px;
            border-radius: 12px;
            width: 320px;
            max-width: 90%;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
            text-align: left;
            animation: aparecer 0.25s ease;
        }

        .popup-content h3 {
            margin-top: 0;
            color: #2c3e50;
        }

        .popup-content p {
            margin: 8px 0;
            color: #555;
            font-size: 14px;
        }

        .popup-content button {
            margin-top: 10px;
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 6px;
            background: #2c3e50;
            color: white;
            cursor: pointer;
            font-size: 14px;
        }

        .popup-content button:hover {
            background: #1a252f;
        }

        /* Badge de repetição no modal */
        #badge-repeticao {
            display: inline-block;
            background: #3498db;
            color: white;
            font-size: 12px;
            padding: 3px 10px;
            border-radius: 20px;
            margin-top: 6px;
            font-weight: 600;
        }

        @keyframes aparecer {
            from {
                transform: scale(0.9);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        body {
            margin: 0;
            font-family: Arial;
            background: #eef2f7;
            overflow: auto;
            font-family: 'Segoe UI', 'Inter', Arial, sans-serif;
        }

        .container {
            display: flex;
            min-height: calc(100vh - 60px);
            margin-top: 50px;
            padding: 5px;
            gap: 5px;
        }

        .sidebar-left {
            width: 260px;
            background: white;
            border-right: 1px solid #ddd;
            padding: 10px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            border-radius: 12px;
            margin-top: 10px;
            text-align: center;
        }

        #miniCalendar {
            margin-top: 50px;
            font-size: 12px;
            width: 250px;
            height: 250px;
        }

        #miniCalendar .fc-daygrid-day {
            border-radius: 6px;
            transition: 0.2s;
        }

        #miniCalendar .fc-daygrid-day:hover {
            background: #d6eaf8;
            cursor: pointer;
        }

        .fc-day-selecionado {
            background: #3498db !important;
            color: white !important;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.15);
        }

        #lista-leads div {
            background: #f1f1f1;
            padding: 8px;
            margin-top: 5px;
            border-radius: 6px;
            font-size: 14px;
        }

        #contador {
            background: red;
            color: white;
            padding: 2px 6px;
            border-radius: 10px;
            font-size: 12px;
        }

        #miniCalendar .fc-toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        #miniCalendar .fc-toolbar-title {
            font-weight: 600;
            font-size: 20px;
        }

        #miniCalendar .fc-button {
            padding: 2px 6px !important;
            font-size: 12px !important;
        }

        #miniCalendar .fc {
            height: 100% !important;
        }

        #miniCalendar .fc-daygrid-day-frame {
            height: 28px !important;
            background: #f9fafb !important;
        }

        #miniCalendar .fc-day-other {
            display: none;
        }

        .main {
            flex: 1;
            padding: 10px;
            overflow: hidden;
        }

        #calendar {
            background: white;
            border-radius: 14px;
            padding: 5px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
        }

        .sidebar-right {
            width: 300px;
            background: white;
            border-left: 1px solid #ddd;
            padding: 15px;
            overflow-y: auto;
            border-radius: 12px;
            margin-top: 10px;
            text-align: center;
        }

        #dataSelecionada {
            text-align: center;
            margin-bottom: 15px;
            padding: 15px;
            border-radius: 12px;
            background: linear-gradient(135deg, #3498db, #2c3e50);
            color: white;
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.15);
        }

        #dataSelecionada div:first-child {
            text-transform: capitalize;
            font-size: 18px;
            font-weight: bold;
        }

        #dataSelecionada div:last-child {
            font-size: 14px;
            color: #666;
        }

        .evento {
            background: white;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 10px;
            border-left: 5px solid #3498db;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
            transition: 0.2s;
        }

        .evento:hover {
            transform: translateY(-2px);
        }

        .fc-timegrid-slot {
            height: 24px !important;
        }

        .fc-timegrid-axis {
            font-size: 15px;
        }

        .calendar-cell {
            position: relative;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .calendar-cell:hover {
            background-color: #eef5ea;
        }

        .calendar-cell:hover::after {
            content: "+";
            position: absolute;
            top: 5px;
            right: 8px;
            font-weight: bold;
            color: #809671;
        }

        .fc-timegrid-slot:hover {
            background: #e6f0ff !important;
            cursor: pointer;
        }

        .fc-event {
            text-align: center;
            border-radius: 10px !important;
            padding: 2px;
            font-size: 13px;
            border: none !important;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        .fc-event:hover {
            transform: scale(1.03);
        }

        #dias-semana {
            display: none;
            margin-top: 10px;
            flex-direction: column;
            gap: 10px;
        }

        #dias-semana.show {
            display: flex;
        }

        #dias-semana label {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #f8f9fa;
            padding: 8px;
            border-radius: 6px;
            cursor: pointer;
        }

        #dias-semana label:hover {
            background: #e9ecef;
        }

        #dias-semana input {
            width: auto;
        }

        .header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: #2f3e4d;
            color: white;
            padding: 15px 20px;
            font-size: 18px;
            font-weight: 600;
            display: flex;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            z-index: 10002;
            box-sizing: border-box;
        }

        #toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #2c3e50;
            color: white;
            padding: 12px 18px;
            margin: 30px;
            border-radius: 8px;
            opacity: 0;
            transform: translateY(-10px);
            transition: 0.3s;
            z-index: 9999;
            font-size: 14px;
        }

        #toast.show {
            opacity: 1;
            transform: translateY(0);
        }

        #toast.success {
            background: #27ae60;
        }

        #toast.error {
            background: #e74c3c;
        }
    </style>
</head>

<body>

    <div class="header">
        <span id="menu-btn" style="cursor:pointer; margin-right:10px;">☰</span>
        <span>📅 Agenda</span>
    </div>

    <div id="menu-lateral">
        <ul>
            <li onclick="irPara('leads.html')">Leads</li>
            <li onclick="irPara('pacientes.html')">Pacientes</li>
            <li onclick="irPara('agendar.html')">Agendar</li>
            <li onclick="irPara('editar.html')">Editar</li>
            <li onclick="irPara('relatorio.html')">Relatório</li>
        </ul>
    </div>

    <div class="container">

        <!-- ESQUERDA -->
        <div class="sidebar-left">
            <div style="width:100%;">
                <div id="miniCalendar"></div>
                <h4 style="margin-top:20px;">
                    Leads <span id="contador">(0)</span>
                </h4>
                <div id="lista-leads"></div>
            </div>
        </div>

        <!-- CENTRO -->
        <div class="main">
            <div id="calendar"></div>
        </div>

        <!-- DIREITA -->
        <div class="sidebar-right">
            <div id="painel-dia">
                <h3 id="dataHoje"></h3>
                <div id="listaEventos"></div>
            </div>
        </div>

    </div>

    <!-- MODAL CONFIRMAÇÃO -->
    <div id="confirm-modal" class="popup">
        <div class="popup-content">
            <h3>Confirmação</h3>
            <p>Deseja remover todos da série?</p>
            <button onclick="confirmarAcao(true)">Sim, todos</button>
            <button onclick="confirmarAcao(false)">Apenas este</button>
            <button onclick="fecharConfirm()">Cancelar</button>
        </div>
    </div>

    <!-- MODAL LEAD -->
    <div id="lead-popup" class="popup">
        <div class="popup-content">
            <h3 id="lead-nome"></h3>
            <p id="lead-telefone"></p>
            <p id="lead-email"></p>
            <p id="lead-mensagem"></p>
            <button onclick="fecharPopup()">Fechar</button>
        </div>
    </div>

    <!-- MODAL CONSULTA/EVENTO -->
    <div id="modal-consulta" class="popup">
        <div class="popup-content">
            <h3 id="modal-nome"></h3>
            <p id="modal-telefone"></p>
            <p id="modal-data"></p>

            <!-- Badge mostrando tipo de repetição salvo -->
            <div id="badge-repeticao" style="display:none;"></div>

            <textarea id="modal-titulo" placeholder="Descrição do evento" style="
                width: 100%;
                margin-top: 10px;
                padding: 8px;
                border-radius: 6px;
                border: 1px solid #ccc;
                box-sizing: border-box;
            "></textarea>

            <select id="repeticao" style="
                width: 100%;
                margin-top: 10px;
                padding: 8px;
                border-radius: 6px;
                border: 1px solid #ccc;
                box-sizing: border-box;
            ">
                <option value="">Não repetir</option>
                <option value="semanal">Semanal</option>
                <option value="quinzenal">Quinzenal</option>
                <option value="mensal">Mensal</option>
            </select>

            <div id="dias-semana" style="margin-top:10px;">
                <label><input type="checkbox" value="1"> Seg</label>
                <label><input type="checkbox" value="2"> Ter</label>
                <label><input type="checkbox" value="3"> Qua</label>
                <label><input type="checkbox" value="4"> Qui</label>
                <label><input type="checkbox" value="5"> Sex</label>
            </div>

            <button onclick="salvar()">Salvar</button>
            <button onclick="desmarcar()">Desmarcar</button>
            <button onclick="reagendar()">Reagendar</button>
            <button onclick="fecharModal()">Fechar</button>

            <div id="reagendamento-box" style="display:none; margin-top:10px;">
                <label>Nova data</label>
                <input type="date" id="novaData"
                    style="width:100%; padding:6px; border-radius:6px; border:1px solid #ccc; box-sizing:border-box;">
                <label style="margin-top:8px; display:block;">Nova hora</label>
                <select id="novaHora"
                    style="width:100%; padding:6px; border-radius:6px; border:1px solid #ccc; box-sizing:border-box;"></select>
                <button onclick="salvarReagendamento()" style="margin-top:10px;">Confirmar Reagendamento</button>
            </div>
        </div>
    </div>

    <div id="toast"></div>

    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>

    <script>

        let dataSelecionadaGlobal = null;

        const API_BASE = "http://localhost:8080";

        // ─── ARMAZENAMENTO LOCAL DE METADADOS DE REPETIÇÃO ───────────────────────────
        // Chave: grupoId | Valor: { repeticao, diasSemana[] }
        // Persiste em localStorage para sobreviver a recarregamentos de página
        function salvarMetaGrupo(grupoId, repeticao, diasSemana) {
            const meta = JSON.parse(localStorage.getItem("grupoMeta") || "{}");
            meta[grupoId] = { repeticao, diasSemana };
            localStorage.setItem("grupoMeta", JSON.stringify(meta));
        }

        function obterMetaGrupo(grupoId) {
            const meta = JSON.parse(localStorage.getItem("grupoMeta") || "{}");
            return meta[grupoId] || null;
        }

        function labelRepeticao(valor) {
            const mapa = { semanal: "🔁 Semanal", quinzenal: "🔁 Quinzenal", mensal: "🔁 Mensal" };
            return mapa[valor] || null;
        }

        // ─── CORREÇÃO DE FUSO: data local sem deslocamento UTC ───────────────────────
        function dataLocalStr(date) {
            // Retorna "YYYY-MM-DD" no horário LOCAL (não UTC)
            const y = date.getFullYear();
            const m = String(date.getMonth() + 1).padStart(2, "0");
            const d = String(date.getDate()).padStart(2, "0");
            return `${y}-${m}-${d}`;
        }

        document.addEventListener('DOMContentLoaded', function () {

            const calendarEl = document.getElementById('calendar');
            const miniEl = document.getElementById('miniCalendar');
            const titulo = document.getElementById("dataHoje");
            const lista = document.getElementById("listaEventos");

            async function carregarEventosDia(dataStr) {
                // dataStr: "YYYY-MM-DD" (local)
                const response = await fetch(`${API_BASE}/agenda/dia?data=${dataStr}`);
                const eventos = await response.json();

                // Usa Date com horário noon para evitar virada de dia por fuso
                const partes = dataStr.split("-");
                const d = new Date(parseInt(partes[0]), parseInt(partes[1]) - 1, parseInt(partes[2]), 12);

                titulo.innerHTML = `
                    <div>${d.toLocaleDateString('pt-BR', { weekday: 'long' })}</div>
                    <div>${d.toLocaleDateString('pt-BR', { day: 'numeric', month: 'long', year: 'numeric' })}</div>
                `;

                lista.innerHTML = "";

                if (!eventos || eventos.length === 0) {
                    lista.innerHTML = "<p>Nenhum compromisso</p>";
                    return;
                }

                eventos.sort((a, b) =>
                    new Date(a.inicio || a.dataHora) - new Date(b.inicio || b.dataHora)
                );

                eventos.forEach(e => {
                    const dataEvento = new Date(e.horario);
                    const hora = dataEvento.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });

                    const div = document.createElement("div");
                    div.classList.add("evento");
                    div.style.background = e.tipo === "consulta" ? "#2ecc71" : "#3498db";
                    div.style.color = "#fff";
                    div.innerHTML = `<strong>${hora}</strong><br>${e.descricao || "Sem descrição"}`;
                    lista.appendChild(div);
                });
            }

            // CALENDÁRIO PRINCIPAL
            const calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'timeGridWeek',
                locale: 'pt-br',
                height: '100%',
                expandRows: true,

                headerToolbar: {
                    left: 'prev,next today',
                    center: 'title',
                    right: ''
                },

                slotMinTime: "08:00:00",
                slotMaxTime: "24:00:00",
                allDaySlot: false,

                dateClick: function (info) {
                    const dataObj = info.date;
                    const dataLocal = dataLocalStr(info.date);

                    calendar.gotoDate(dataLocal);

                    // salva selecao
                    dataSelecionadaGlobal = dataLocal;

                    // atualiza mini calendário
                    miniCalendar.gotoDate(dataLocal);
                    miniCalendar.render();

                    pintarDataSelecionada();

                    document.getElementById("modal-data").innerText =
                        `${dataObj.toLocaleDateString("pt-BR", {
                            day: "2-digit",
                            month: "2-digit",
                            year: "numeric"
                        })} às ${dataObj.toLocaleTimeString("pt-BR", {
                            hour: "2-digit",
                            minute: "2-digit"
                        })}`;

                    document.getElementById("modal-nome").innerText = "Novo Evento";
                    document.getElementById("modal-telefone").innerText = "";
                    document.getElementById("modal-consulta").classList.add("show");

                    document.getElementById("badge-repeticao").style.display = "none";

                    window.novaDataSelecionada = info.date;
                    window.modo = "evento";
                    window.eventoAtual = null;
                    window.grupoIdAtual = null;

                    document.getElementById("modal-titulo").value = "";
                    document.getElementById("repeticao").value = "";
                    document.getElementById("dias-semana").classList.remove("show");

                    const checkboxes = document.querySelectorAll("#dias-semana input");
                    checkboxes.forEach(cb => cb.checked = false);
                },

                events: async function (fetchInfo, successCallback) {
                    const [resConsultas, resEventos] = await Promise.all([
                        fetch(`${API_BASE}/api/consultas`),
                        fetch(`${API_BASE}/api/eventos`)
                    ]);

                    const consultas = await resConsultas.json();
                    const eventosApi = await resEventos.json();

                    let eventos = [];

                    consultas.forEach(c => {
                        const inicio = new Date(c.dataHora);
                        const fim = new Date(inicio.getTime() + 60 * 60 * 1000);
                        eventos.push({
                            id: c.id,
                            title: c.paciente?.nome || "Paciente",
                            start: inicio,
                            end: fim,
                            color: "#2ecc71",
                            extendedProps: { tipo: "consulta", id: c.id }
                        });
                    });

                    eventosApi.forEach(e => {
                        eventos.push({
                            id: e.id,
                            title: e.descricao,
                            start: new Date(e.inicio),
                            end: new Date(e.fim),
                            color: "#3498db",
                            extendedProps: { tipo: "evento", grupoId: e.grupoId }
                        });
                    });

                    successCallback(eventos);
                },

                eventClick: async function (info) {
                    const evento = info.event;

                    if (evento.extendedProps.tipo === "evento") {
                        document.getElementById("modal-nome").innerText = "Evento";
                        document.getElementById("modal-telefone").innerText = "";
                        document.getElementById("modal-data").innerText = new Date(evento.start).toLocaleString("pt-BR");
                        document.getElementById("modal-titulo").value = evento.title;

                        window.modo = "evento";
                        window.novaDataSelecionada = evento.start;
                        window.eventoAtual = evento.id;
                        window.grupoIdAtual = evento.extendedProps.grupoId;

                        // ── NOVO: mostrar badge de repetição salvo ──
                        const badge = document.getElementById("badge-repeticao");
                        const grupoId = evento.extendedProps.grupoId || evento.id;
                        const meta = obterMetaGrupo(grupoId);

                        console.log("DEBUG grupoId:", grupoId);
                        console.log("DEBUG meta:", meta);

                        if (meta && meta.repeticao) {
                            badge.textContent = labelRepeticao(meta.repeticao);
                            badge.style.display = "inline-block";

                            // Preenche o select com o valor salvo
                            document.getElementById("repeticao").value = meta.repeticao;

                            // Marca os dias salvos se semanal/quinzenal
                            if (meta.repeticao === "semanal" || meta.repeticao === "quinzenal") {
                                document.getElementById("dias-semana").classList.add("show");
                                const checkboxes = document.querySelectorAll("#dias-semana input");
                                checkboxes.forEach(cb => {
                                    cb.checked = meta.diasSemana && meta.diasSemana.includes(parseInt(cb.value));
                                });
                            } else {
                                document.getElementById("dias-semana").classList.remove("show");
                            }
                        } else {
                            badge.style.display = "none";
                            document.getElementById("repeticao").value = "";
                            document.getElementById("dias-semana").classList.remove("show");
                        }

                        document.getElementById("modal-consulta").classList.add("show");

                        document.getElementById("repeticao").onchange = function () {
                            const dias = document.getElementById("dias-semana");
                            if (this.value === "semanal" || this.value === "quinzenal") {
                                dias.classList.add("show");
                            } else {
                                dias.classList.remove("show");
                            }
                        };

                        return;
                    }

                    // CONSULTA
                    const response = await fetch(`${API_BASE}/api/consultas`);
                    const consultas = await response.json();
                    const consulta = consultas.find(c => c.id === evento.extendedProps.id);

                    document.getElementById("modal-nome").innerText = "Paciente: " + (consulta.paciente?.nome || "Sem nome");
                    document.getElementById("modal-telefone").innerText = "Telefone: " + (consulta.paciente?.telefone || "-");
                    document.getElementById("modal-data").innerText = "Data: " + new Date(consulta.dataHora).toLocaleString("pt-BR");
                    document.getElementById("modal-titulo").value = consulta.observacao || "";
                    document.getElementById("badge-repeticao").style.display = "none";

                    window.consultaAtual = consulta.id;
                    window.modo = "consulta";

                    document.getElementById("modal-consulta").classList.add("show");
                }
            });

            calendar.render();
            window.calendar = calendar;

            // FIX FUSO: carrega o dia de hoje usando data local
            const hoje = dataLocalStr(new Date());
            carregarEventosDia(hoje);

            //setInterval(() => calendar.refetchEvents(), 10000);

            // MINI CALENDÁRIO
            const miniCalendar = new FullCalendar.Calendar(miniEl, {
                initialView: 'dayGridMonth',
                locale: 'pt-br',
                height: "auto",
                headerToolbar: { left: 'prev,next', center: 'title', right: '' },
                showNonCurrentDates: false,
                fixedWeekCount: false,

                dateClick: function (info) {
                    const dataLocal = dataLocalStr(info.date);

                    dataSelecionadaGlobal = dataLocal;

                    calendar.gotoDate(dataLocal);

                    pintarDataSelecionada(); // 🔥 ESSA LINHA
                }
            });

            miniCalendar.render();

            // LEADS
            let leads = [];

            function atualizarLeads() {
                const listaEl = document.getElementById("lista-leads");
                const contador = document.getElementById("contador");
                listaEl.innerHTML = "";

                leads.forEach(lead => {
                    const div = document.createElement("div");
                    div.innerText = lead.nome;
                    div.style.cursor = "pointer";
                    div.onclick = () => {
                        document.getElementById("lead-nome").innerText = lead.nome;
                        document.getElementById("lead-telefone").innerText = "Telefone: " + lead.telefone;
                        document.getElementById("lead-email").innerText = "Email: " + lead.email;
                        document.getElementById("lead-mensagem").innerText = "Mensagem: " + lead.mensagem;
                        document.getElementById("lead-popup").classList.add("show");
                    };
                    listaEl.appendChild(div);
                });

                const total = leads.length;
                document.title = total > 0 ? `Agenda Profissional (${total})` : "Agenda Profissional";
                contador.innerText = `(${total})`;
            }

            function carregarLeads() {
                fetch(`${API_BASE}/api/leads`)
                    .then(res => res.json())
                    .then(data => {
                        leads = data;
                        atualizarLeads();
                    });
            }

            carregarLeads();
            setInterval(carregarLeads, 5000);
        });

        // ─── FUNÇÕES GLOBAIS ───────────────────────────────────────────────────────

        function irPara(pagina) { window.location.href = pagina; }

        function fecharPopup() {
            document.getElementById("lead-popup").classList.remove("show");
        }

        function fecharModal() {
            document.getElementById("modal-consulta").classList.remove("show");
            document.getElementById("reagendamento-box").style.display = "none";
        }

        function reagendar() {
            const box = document.getElementById("reagendamento-box");
            box.style.display = "block";
            gerarHorarios();
        }

        function gerarHorarios() {
            const select = document.getElementById("novaHora");
            select.innerHTML = "";
            for (let h = 8; h <= 23; h++) {
                const hora = String(h).padStart(2, "0");
                const op1 = document.createElement("option");
                op1.value = `${hora}:00`; op1.text = `${hora}:00`;
                const op2 = document.createElement("option");
                op2.value = `${hora}:30`; op2.text = `${hora}:30`;
                select.appendChild(op1);
                select.appendChild(op2);
            }
        }

        async function salvarEdicao() {
            const observacao = document.getElementById("modal-titulo").value;
            await fetch(`${API_BASE}/api/consultas/${window.consultaAtual}`, {
                method: "PUT",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ observacao })
            });
            mostrarToast("Observação salva!", "success");
            fecharModal();
        }

        async function salvarReagendamento() {
            const novaData = document.getElementById("novaData").value;
            const novaHora = document.getElementById("novaHora").value;
            const novaDataHora = `${novaData}T${novaHora}:00`;

            const res = await fetch(`${API_BASE}/api/consultas/${window.consultaAtual}`, {
                method: "PUT",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ dataHora: novaDataHora })
            });

            if (res.ok) {
                mostrarToast("Reagendado!", "success");
                fecharModal();
                window.calendar.refetchEvents();
            } else {
                mostrarToast("Erro ao reagendar", "error");
            }
        }

        async function salvar() {
            const grupoId = String(window.grupoIdAtual || Date.now());
            const meta = obterMetaGrupo(grupoId);

            if (window.modo === "evento") {
                const titulo = document.getElementById("modal-titulo").value;
                const repeticao = document.getElementById("repeticao").value;
                const inicioBase = new Date(window.novaDataSelecionada);

                const checkboxes = document.querySelectorAll("#dias-semana input:checked");
                const diasSelecionados = Array.from(checkboxes)
                    .map(cb => parseInt(cb.value))
                    .sort((a, b) => a - b);

                const limite = new Date(inicioBase);
                limite.setFullYear(limite.getFullYear() + 1);

                let eventosParaCriar = [];

                if (!repeticao) {
                    eventosParaCriar.push(new Date(inicioBase));
                }

                if (repeticao === "semanal" || repeticao === "quinzenal") {
                    const intervaloSemanas = repeticao === "quinzenal" ? 2 : 1;

                    let data = new Date(inicioBase);
                    data.setDate(data.getDate() - data.getDay());

                    let semanaBase = new Date(inicioBase);
                    semanaBase.setHours(0, 0, 0, 0);

                    let semanaIndex = 0;

                    while (data <= limite) {

                        const diffSemanas = Math.floor(
                            (data - semanaBase) / (7 * 24 * 60 * 60 * 1000)
                        );

                        if (diffSemanas % intervaloSemanas === 0) {

                            diasSelecionados.forEach(dia => {
                                let nova = new Date(data);

                                const diaAtual = nova.getDay();
                                const ajuste = dia - diaAtual;

                                nova.setDate(nova.getDate() + ajuste);

                                nova.setHours(inicioBase.getHours());
                                nova.setMinutes(inicioBase.getMinutes());

                                if (nova >= inicioBase && nova <= limite) {

                                    const jaExiste = eventosParaCriar.some(e =>
                                        e.getTime() === nova.getTime()
                                    );

                                    if (!jaExiste) {
                                        eventosParaCriar.push(new Date(nova));
                                    }
                                }
                            });
                        }

                        data.setDate(data.getDate() + 7);
                    }
                }

                if (repeticao === "mensal") {
                    let data = new Date(inicioBase);
                    while (data <= limite) {
                        eventosParaCriar.push(new Date(data));
                        data = new Date(
                            data.getFullYear(),
                            data.getMonth() + 1,
                            inicioBase.getDate(),
                            inicioBase.getHours(),
                            inicioBase.getMinutes()
                        );
                    }
                }

                const respostas = await Promise.all(
                    eventosParaCriar.map(data => {
                        const inicio = new Date(data);
                        const fim = new Date(inicio.getTime() + 60 * 60 * 1000);

                        return fetch(`${API_BASE}/api/eventos`, {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({
                                descricao: titulo,
                                inicio: inicio.toLocaleString("sv-SE").replace(" ", "T"),
                                fim: fim.toLocaleString("sv-SE").replace(" ", "T"),
                                grupoId
                            })
                        });
                    })
                );

                const erro = respostas.find(r => !r.ok);

                if (erro) {
                    mostrarToast("Erro ao salvar alguns eventos", "error");
                    return;
                }

                // ── NOVO: salvar metadados de repetição localmente ──
                if (repeticao) {
                    salvarMetaGrupo(grupoId, repeticao, diasSelecionados);
                }

                mostrarToast("Evento(s) criado(s)!", "success");
                fecharModal();
                window.calendar.refetchEvents();
                window.eventoAtual = null;

            } else {
                await salvarEdicao();
                window.calendar.refetchEvents();
            }
        }

        async function desmarcar() {
            const confirmar = await abrirConfirm();
            if (confirmar === null) return;

            if (window.modo === "consulta") {

                if (confirmar === true) {
                    // APAGA TODA RECORRÊNCIA
                    await fetch(`${API_BASE}/agenda/consulta/${window.consultaAtual}?todos=true`, {
                        method: "DELETE"
                    });
                    mostrarToast("Toda a série removida!", "success");

                } else {
                    // APAGA SÓ UMA
                    await fetch(`${API_BASE}/agenda/consulta/${window.consultaAtual}`, {
                        method: "DELETE"
                    });
                    mostrarToast("Consulta removida!", "success");
                }

            } else if (window.modo === "evento") {

                if (confirmar === true && window.grupoIdAtual != null) {
                    await fetch(`${API_BASE}/api/eventos/grupo/${window.grupoIdAtual}`, { method: "DELETE" });
                    mostrarToast("Eventos da série removidos!", "success");

                } else if (confirmar === false && window.eventoAtual) {
                    await fetch(`${API_BASE}/api/eventos/${window.eventoAtual}`, { method: "DELETE" });
                    mostrarToast("Evento removido!", "success");
                }
            }

            fecharModal();
            window.calendar.refetchEvents();
        }

        function mostrarToast(mensagem, tipo = "success") {
            const toast = document.getElementById("toast");
            toast.innerText = mensagem;
            toast.className = `show ${tipo}`;
            setTimeout(() => { toast.className = ""; }, 3000);
        }

        let respostaConfirmacao = null;

        function abrirConfirm() {
            document.getElementById("modal-consulta").classList.remove("show");
            document.getElementById("confirm-modal").classList.add("show");
            return new Promise(resolve => { respostaConfirmacao = resolve; });
        }

        function confirmarAcao(valor) {
            document.getElementById("confirm-modal").classList.remove("show");
            respostaConfirmacao(valor);
        }

        function fecharConfirm() {
            document.getElementById("confirm-modal").classList.remove("show");
            document.getElementById("modal-consulta").classList.add("show");
            respostaConfirmacao(null);
        }

        function pintarDataSelecionada() {
            // limpa anterior
            document.querySelectorAll("#miniCalendar .fc-daygrid-day")
                .forEach(el => el.classList.remove("fc-day-selecionado"));

            const dia = document.querySelector(
                `#miniCalendar [data-date="${dataSelecionadaGlobal}"]`
            );

            if (dia) {
                dia.classList.add("fc-day-selecionado");
            }
        }

        document.getElementById("menu-btn").addEventListener("click", () => {
            document.getElementById("menu-lateral").classList.toggle("show");
        });



    </script>

</body>
