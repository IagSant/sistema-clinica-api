<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Agenda Profissional</title>
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css" rel="stylesheet">

    <style>
        #menu-btn {
            position: relative;
            font-size: 20px;
            cursor: pointer;
            margin-right: 10px;
            z-index: 10001;
        }

        #menu-lateral {
            position: fixed;
            top: 0;
            left: -220px;
            width: 220px;
            height: 100%;
            background: #2c3e50;
            color: white;
            padding-top: 60px;
            transition: 0.3s;
            z-index: 9999;
        }

        #menu-lateral.show {
            left: 0;
        }

        #menu-lateral ul {
            list-style: none;
            padding: 0;
        }

        #menu-lateral li {
            padding: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            cursor: pointer;
        }

        #menu-lateral li:hover {
            background: #34495e;
        }

        .popup {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: 0.3s;
            z-index: 10000;
        }

        .popup.show {
            opacity: 1;
            pointer-events: all;
        }

        .popup-content {
            background: white;
            padding: 25px;
            border-radius: 12px;
            width: 320px;
            max-width: 90%;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
            text-align: left;
            animation: aparecer 0.25s ease;
        }

        .popup-content h3 {
            margin-top: 0;
            color: #2c3e50;
        }

        .popup-content p {
            margin: 8px 0;
            color: #555;
            font-size: 14px;
        }

        .popup-content button {
            margin-top: 10px;
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 6px;
            background: #2c3e50;
            color: white;
            cursor: pointer;
            font-size: 14px;
        }

        .popup-content button:hover {
            background: #1a252f;
        }

        #badge-repeticao {
            display: inline-block;
            background: #3498db;
            color: white;
            font-size: 12px;
            padding: 3px 10px;
            border-radius: 20px;
            margin-top: 6px;
            font-weight: 600;
        }

        @keyframes aparecer {
            from {
                transform: scale(0.9);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #eef2f7;
            overflow: auto;
        }

        .container {
            display: flex;
            min-height: calc(100vh - 60px);
            margin-top: 50px;
            padding: 5px;
            gap: 5px;
        }

        .sidebar-left {
            width: 260px;
            background: white;
            border-right: 1px solid #ddd;
            padding: 10px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            border-radius: 12px;
            margin-top: 10px;
            text-align: center;
        }

        #miniCalendar {
            margin-top: 50px;
            font-size: 12px;
            width: 250px;
        }

        #miniCalendar .fc-daygrid-day {
            border-radius: 6px;
            transition: 0.2s;
        }

        #miniCalendar .fc-daygrid-day:hover {
            background: #d6eaf8;
            cursor: pointer;
        }

        .fc-day-selecionado {
            background: #3498db !important;
            color: white !important;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.15);
        }

        #lista-leads div {
            background: #f1f1f1;
            padding: 8px;
            margin-top: 5px;
            border-radius: 6px;
            font-size: 14px;
        }

        #contador {
            background: red;
            color: white;
            padding: 2px 6px;
            border-radius: 10px;
            font-size: 12px;
        }

        #miniCalendar .fc-toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        #miniCalendar .fc-toolbar-title {
            font-weight: 600;
            font-size: 16px;
        }

        #miniCalendar .fc-button {
            padding: 2px 6px !important;
            font-size: 12px !important;
        }

        #miniCalendar .fc {
            height: 100% !important;
        }

        #miniCalendar .fc-daygrid-day-frame {
            height: 28px !important;
            background: #f9fafb !important;
        }

        #miniCalendar .fc-day-other {
            display: none;
        }

        .main {
            flex: 1;
            padding: 10px;
            overflow: hidden;
        }

        #calendar {
            background: white;
            border-radius: 14px;
            padding: 5px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
        }

        .sidebar-right {
            width: 300px;
            background: white;
            border-left: 1px solid #ddd;
            padding: 15px;
            overflow-y: auto;
            border-radius: 12px;
            margin-top: 10px;
            text-align: center;
        }

        .evento {
            background: white;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 10px;
            border-left: 5px solid #3498db;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
            transition: 0.2s;
            text-align: left;
        }

        .evento:hover {
            transform: translateY(-2px);
        }

        .fc-timegrid-slot {
            height: 24px !important;
        }

        .fc-timegrid-axis {
            font-size: 15px;
        }

        .fc-timegrid-slot:hover {
            background: #e6f0ff !important;
            cursor: pointer;
        }

        .fc-event {
            text-align: center;
            border-radius: 10px !important;
            padding: 2px;
            font-size: 13px;
            border: none !important;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        .fc-event:hover {
            transform: scale(1.03);
        }

        #dias-semana {
            display: none;
            margin-top: 10px;
            flex-direction: column;
            gap: 8px;
        }

        #dias-semana.show {
            display: flex;
        }

        #dias-semana label {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #f8f9fa;
            padding: 8px;
            border-radius: 6px;
            cursor: pointer;
        }

        #dias-semana label:hover {
            background: #e9ecef;
        }

        #dias-semana input {
            width: auto;
        }

        .header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: #2f3e4d;
            color: white;
            padding: 15px 20px;
            font-size: 18px;
            font-weight: 600;
            display: flex;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            z-index: 10002;
            box-sizing: border-box;
        }

        #toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #2c3e50;
            color: white;
            padding: 12px 18px;
            border-radius: 8px;
            opacity: 0;
            transform: translateY(10px);
            transition: 0.3s;
            z-index: 10003;
            font-size: 14px;
        }

        #toast.show {
            opacity: 1;
            transform: translateY(0);
        }

        #toast.success {
            background: #27ae60;
        }

        #toast.error {
            background: #e74c3c;
        }

        #dataHoje {
            font-size: 15px;
            font-weight: bold;
            text-transform: capitalize;
            color: #2c3e50;
            margin-bottom: 12px;
            padding-bottom: 10px;
            border-bottom: 1px solid #eee;
        }

        #badge-repeticao {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #3498db;
            color: white;
            font-size: 12px;
            padding: 4px 10px;
            border-radius: 999px;
            font-weight: 600;
        }
    </style>
</head>

<body>

    <div class="header">
        <span id="menu-btn">☰</span>
        <span>📅 Agenda</span>
    </div>

    <div id="menu-lateral">
        <ul>
            <li onclick="irPara('leads.html')">Leads</li>
            <li onclick="irPara('pacientes.html')">Pacientes</li>
            <li onclick="irPara('agendar.html')">Agendar</li>
            <li onclick="irPara('editar.html')">Editar</li>
            <li onclick="irPara('relatorio.html')">Relatório</li>
        </ul>
    </div>

    <div class="container">

        <!-- ESQUERDA -->
        <div class="sidebar-left">
            <div style="width:100%;">
                <div id="miniCalendar"></div>
                <h4 style="margin-top:20px;">
                    Leads <span id="contador">(0)</span>
                </h4>
                <div id="lista-leads"></div>
            </div>
        </div>

        <!-- CENTRO -->
        <div class="main">
            <div id="calendar"></div>
        </div>

        <!-- DIREITA -->
        <div class="sidebar-right">
            <div id="painel-dia">
                <div id="dataHoje"></div>
                <div id="listaEventos">
                    <p style="color:#999;">Selecione um dia</p>
                </div>
            </div>
        </div>

    </div>

    <!-- MODAL CONFIRMAÇÃO -->
    <div id="confirm-modal" class="popup">
        <div class="popup-content">
            <h3>Confirmação</h3>
            <p>Deseja remover todos da série?</p>
            <button onclick="confirmarAcao(true)">Sim, todos</button>
            <button onclick="confirmarAcao(false)">Apenas este</button>
            <button onclick="fecharConfirm()">Cancelar</button>
        </div>
    </div>

    <!-- MODAL LEAD -->
    <div id="lead-popup" class="popup">
        <div class="popup-content">
            <h3 id="lead-nome"></h3>
            <p id="lead-telefone"></p>
            <p id="lead-email"></p>
            <p id="lead-mensagem"></p>
            <button onclick="fecharPopup()">Fechar</button>
        </div>
    </div>

    <!-- MODAL CONSULTA/EVENTO -->
    <div id="modal-consulta" class="popup">
        <div class="popup-content">
            <h3 id="modal-nome"></h3>
            <p id="modal-telefone"></p>
            <p id="modal-data"></p>

            <div id="badge-repeticao" style="display:none;"></div>

            <textarea id="modal-titulo" placeholder="Descrição do evento" style="
                width: 100%;
                margin-top: 10px;
                padding: 8px;
                border-radius: 6px;
                border: 1px solid #ccc;
                box-sizing: border-box;
                resize: vertical;
                min-height: 60px;
            "></textarea>

            <select id="repeticao" style="
                width: 100%;
                margin-top: 10px;
                padding: 8px;
                border-radius: 6px;
                border: 1px solid #ccc;
                box-sizing: border-box;
            ">
                <option value="">Não repetir</option>
                <option value="semanal">Semanal</option>
                <option value="quinzenal">Quinzenal</option>
                <option value="mensal">Mensal</option>
            </select>

            <div id="dias-semana">
                <label><input type="checkbox" value="1"> Seg</label>
                <label><input type="checkbox" value="2"> Ter</label>
                <label><input type="checkbox" value="3"> Qua</label>
                <label><input type="checkbox" value="4"> Qui</label>
                <label><input type="checkbox" value="5"> Sex</label>
            </div>

            <button onclick="salvar()">Salvar</button>
            <button onclick="desmarcar()">Desmarcar</button>
            <button onclick="reagendar()">Reagendar</button>
            <button onclick="fecharModal()">Fechar</button>

            <div id="reagendamento-box" style="display:none; margin-top:10px;">
                <label>Nova data</label>
                <input type="date" id="novaData"
                    style="width:100%; padding:6px; border-radius:6px; border:1px solid #ccc; box-sizing:border-box; margin-top:4px;">
                <label style="margin-top:8px; display:block;">Nova hora</label>
                <select id="novaHora"
                    style="width:100%; padding:6px; border-radius:6px; border:1px solid #ccc; box-sizing:border-box;"></select>
                <button onclick="salvarReagendamento()" style="margin-top:10px;">Confirmar Reagendamento</button>
            </div>
        </div>
    </div>

    <div id="toast"></div>

    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>

    <script>

        // ─── ESTADO GLOBAL ────────────────────────────────────────────────────────────
        const API_BASE = "http://localhost:8080";
        let dataSelecionadaGlobal = null;
        let miniCalendarInstance = null;

        // ─── UTILITÁRIOS ──────────────────────────────────────────────────────────────

        // Retorna "YYYY-MM-DD" no fuso LOCAL (evita deslocamento UTC)
        function dataLocalStr(date) {
            const y = date.getFullYear();
            const m = String(date.getMonth() + 1).padStart(2, "0");
            const d = String(date.getDate()).padStart(2, "0");
            return `${y}-${m}-${d}`;
        }

        // Metadados de repetição persistidos em localStorage (grupoId → {repeticao, diasSemana})
        function salvarMetaGrupo(grupoId, repeticao, diasSemana) {
            const meta = JSON.parse(localStorage.getItem("grupoMeta") || "{}");
            meta[String(grupoId)] = { repeticao, diasSemana };
            localStorage.setItem("grupoMeta", JSON.stringify(meta));
        }

        function obterMetaGrupo(grupoId) {
            const meta = JSON.parse(localStorage.getItem("grupoMeta") || "{}");
            return meta[String(grupoId)] || null;
        }

        function labelRepeticao(valor) {
            return { semanal: "🔁 Semanal", quinzenal: "🔁 Quinzenal", mensal: "🔁 Mensal" }[valor] || null;
        }

        function mostrarToast(mensagem, tipo = "success") {
            const toast = document.getElementById("toast");
            toast.innerText = mensagem;
            toast.className = `show ${tipo}`;
            setTimeout(() => { toast.className = ""; }, 3000);
        }

        // ─── SIDEBAR DIREITA ──────────────────────────────────────────────────────────

        async function carregarEventosDia(dataStr) {
            const titulo = document.getElementById("dataHoje");
            const lista = document.getElementById("listaEventos");

            const partes = dataStr.split("-");
            const d = new Date(parseInt(partes[0]), parseInt(partes[1]) - 1, parseInt(partes[2]), 12);

            titulo.innerHTML = `
                <div style="font-size:13px;color:#888;text-transform:capitalize;">${d.toLocaleDateString('pt-BR', { weekday: 'long' })}</div>
                <div style="font-size:16px;font-weight:bold;color:#2c3e50;">${d.toLocaleDateString('pt-BR', { day: 'numeric', month: 'long', year: 'numeric' })}</div>
            `;

            lista.innerHTML = "<p style='color:#aaa;font-size:13px;'>Carregando...</p>";

            try {
                const response = await fetch(`${API_BASE}/agenda/dia?data=${dataStr}`);
                const eventos = await response.json();

                lista.innerHTML = "";

                if (!eventos || eventos.length === 0) {
                    lista.innerHTML = "<p style='color:#aaa;font-size:13px;'>Nenhum compromisso</p>";
                    return;
                }

                eventos.sort((a, b) =>
                    new Date(a.inicio || a.dataHora || a.horario) - new Date(b.inicio || b.dataHora || b.horario)
                );

                eventos.forEach(e => {
                    const dataEvento = new Date(e.horario || e.dataHora || e.inicio);
                    const hora = dataEvento.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });

                    const div = document.createElement("div");
                    div.classList.add("evento");
                    if (e.tipo === "consulta") {

                        let cor = "#f1c40f"; // amarelo (pendente)

                        if (e.status === "CONFIRMADO") {
                            cor = "#2ecc71";
                        } else if (e.status === "CANCELADO") {
                            cor = "#e74c3c";
                        }

                        div.style.borderLeftColor = cor;

                    } else {
                        div.style.borderLeftColor = "#3498db";
                    }
                    div.innerHTML = `
                        <strong style="color:#2c3e50;">${hora}</strong>
                        <div style="color:#555;font-size:13px;margin-top:3px;">${e.descricao || e.nome || "Sem descrição"}</div>
                    `;
                    lista.appendChild(div);
                });

            } catch (err) {
                lista.innerHTML = "<p style='color:#e74c3c;font-size:13px;'>Erro ao carregar</p>";
            }
        }

        // ─── MODAL: abrir para NOVO EVENTO (dateClick) ───────────────────────────────

        function abrirModalNovoEvento(dateObj) {
            const dataLocal = dataLocalStr(dateObj);
            dataSelecionadaGlobal = dataLocal;
            carregarEventosDia(dataLocal);
            pintarDataSelecionada();

            document.getElementById("modal-data").innerText =
                `${dateObj.toLocaleDateString("pt-BR", { day: "2-digit", month: "2-digit", year: "numeric" })} às ${dateObj.toLocaleTimeString("pt-BR", { hour: "2-digit", minute: "2-digit" })}`;

            document.getElementById("modal-nome").innerText = "Novo Evento";
            document.getElementById("modal-telefone").innerText = "";
            document.getElementById("badge-repeticao").style.display = "none";
            document.getElementById("modal-titulo").value = "";
            document.getElementById("repeticao").value = "";
            document.getElementById("dias-semana").classList.remove("show");
            document.querySelectorAll("#dias-semana input").forEach(cb => cb.checked = false);
            document.getElementById("reagendamento-box").style.display = "none";

            window.novaDataSelecionada = dateObj;
            window.modo = "evento";
            window.consultaAtual = null; // MUITO IMPORTANTE
            window.eventoAtual = null;
            window.grupoIdAtual = null;

            document.getElementById("modal-consulta").classList.add("show");
        }

        // ─── MODAL: abrir para EVENTO EXISTENTE (eventClick) ─────────────────────────

        function abrirModalEvento(evento) {

            document.getElementById("repeticao").style.display = "block";
            document.getElementById("dias-semana").classList.add("show");

            const grupoId = evento.extendedProps.grupoId;

            document.getElementById("modal-nome").innerText = "Evento";
            document.getElementById("modal-telefone").innerText = "";
            document.getElementById("modal-data").innerText =
                new Date(evento.start).toLocaleString("pt-BR");

            document.getElementById("modal-titulo").value = evento.title;
            document.getElementById("reagendamento-box").style.display = "none";

            // AQUI É A CORREÇÃO REAL
            window.modo = "evento";
            window.consultaAtual = null;

            window.novaDataSelecionada = evento.start;
            window.eventoAtual = evento.id;
            window.grupoIdAtual = grupoId;

            // Badge de repetição
            const badge = document.getElementById("badge-repeticao");
            const meta = obterMetaGrupo(grupoId);

            if (meta && meta.repeticao) {
                badge.textContent = labelRepeticao(meta.repeticao);
                badge.style.display = "inline-block";

                document.getElementById("repeticao").value = meta.repeticao;

                if (meta.repeticao === "semanal" || meta.repeticao === "quinzenal") {
                    document.getElementById("dias-semana").classList.add("show");

                    document.querySelectorAll("#dias-semana input").forEach(cb => {
                        cb.checked = meta.diasSemana?.includes(parseInt(cb.value));
                    });

                } else {
                    document.getElementById("dias-semana").classList.remove("show");
                }

            } else {
                badge.style.display = "none";
                document.getElementById("repeticao").value = "";
                document.getElementById("dias-semana").classList.remove("show");
            }

            document.getElementById("modal-consulta").classList.add("show");
        }
        // ─── MODAL: abrir para CONSULTA ───────────────────────────────────────────────

        async function abrirModalConsulta(evento) {

            document.getElementById("repeticao").style.display = "none";
            document.getElementById("dias-semana").style.display = "none";
            try {
                const response = await fetch(`${API_BASE}/api/consultas`);
                const consultas = await response.json();
                const consulta = consultas.find(c => c.id === evento.extendedProps.id);

                console.log("BACK grupoId (abrir):", consulta.grupoRecorrencia);

                console.log("CONSULTA:", consulta);
                console.log("GRUPO ID:", consulta.grupoRecorrencia);
                console.log("META:", obterMetaGrupo(consulta.grupoRecorrencia));

                if (!consulta) {
                    mostrarToast("Consulta não encontrada", "error");
                    return;
                }

                document.getElementById("modal-nome").innerText =
                    "Paciente: " + (consulta.paciente?.nome || "Sem nome");

                document.getElementById("modal-telefone").innerText =
                    "Telefone: " + (consulta.paciente?.telefone || "-");

                document.getElementById("modal-data").innerText =
                    "Data: " + new Date(consulta.dataHora).toLocaleString("pt-BR");

                document.getElementById("modal-titulo").value =
                    consulta.observacao || "";

                document.getElementById("reagendamento-box").style.display = "none";

                const badge = document.getElementById("badge-repeticao");
                const grupoId = consulta.grupoRecorrencia;
                const meta = obterMetaGrupo(grupoId);

                if (meta && meta.repeticao) {
                    badge.innerHTML = `
                        <span style="
                        display:inline-flex;
                        align-items:center;
                        gap:6px;
                        ">
                        🔁 ${meta.repeticao.charAt(0).toUpperCase() + meta.repeticao.slice(1)}
                        </span>
                        `;
                    badge.style.display = "inline-flex";

                    document.getElementById("repeticao").value = meta.repeticao;

                } else {
                    badge.style.display = "none";
                }

                // estado global
                window.consultaAtual = consulta.id;
                window.grupoIdAtual = grupoId;
                window.modo = "consulta";

                document.getElementById("modal-consulta").classList.add("show");

            } catch (err) {
                mostrarToast("Erro ao carregar consulta", "error");
            }
        }

        // ─── HIGHLIGHT NO MINI-CALENDÁRIO ─────────────────────────────────────────────

        function pintarDataSelecionada() {
            document.querySelectorAll("#miniCalendar .fc-daygrid-day")
                .forEach(el => el.classList.remove("fc-day-selecionado"));

            if (!dataSelecionadaGlobal) return;

            const dia = document.querySelector(`#miniCalendar [data-date="${dataSelecionadaGlobal}"]`);
            if (dia) dia.classList.add("fc-day-selecionado");
        }

        // ─── INIT ─────────────────────────────────────────────────────────────────────

        document.addEventListener('DOMContentLoaded', function () {

            const calendarEl = document.getElementById('calendar');
            const miniEl = document.getElementById('miniCalendar');

            // ── CALENDÁRIO PRINCIPAL ──
            const calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'timeGridWeek',
                locale: 'pt-br',
                height: '100%',
                expandRows: true,
                headerToolbar: { left: 'prev,next today', center: 'title', right: '' },
                slotMinTime: "08:00:00",
                slotMaxTime: "24:00:00",
                allDaySlot: false,

                dateClick: function (info) {
                    abrirModalNovoEvento(info.date);
                },

                // AQUI (fora do events)
                eventClick: function (info) {
                    const evento = info.event;

                    if (evento.extendedProps.tipo === "evento") {
                        abrirModalEvento(evento);
                    } else {
                        abrirModalConsulta(evento);
                    }
                },

                // events separado corretamente
                events: async function (fetchInfo, successCallback) {
                    try {
                        const [resConsultas, resEventos] = await Promise.all([
                            fetch(`${API_BASE}/api/consultas`),
                            fetch(`${API_BASE}/api/eventos`)
                        ]);

                        const consultas = await resConsultas.json();
                        const eventosApi = await resEventos.json();

                        let eventos = [];

                        // CONSULTAS
                        consultas.forEach(c => {
                            const inicio = new Date(c.dataHora);
                            const fim = new Date(inicio.getTime() + 60 * 60 * 1000);

                            let cor = "#f1c40f"; // 🟡 padrão (pendente)

                            if (c.status === "CONFIRMADO") {
                                cor = "#2ecc71"; // 🟢
                            } else if (c.status === "CANCELADO") {
                                cor = "#e74c3c"; // 🔴
                            }

                            eventos.push({
                                id: c.id,
                                title: c.paciente?.nome || "Paciente",
                                start: inicio,
                                end: fim,
                                color: cor,
                                extendedProps: {
                                    tipo: "consulta",
                                    id: c.id,
                                    grupoId: c.grupoRecorrencia,
                                    status: c.status
                                }
                            });
                        });
                        // EVENTOS
                        eventosApi.forEach(e => {
                            eventos.push({
                                id: e.id,
                                title: e.descricao,
                                start: new Date(e.inicio),
                                end: new Date(e.fim),
                                color: "#3498db",
                                extendedProps: {
                                    tipo: "evento",
                                    grupoId: e.grupoId || e.grupoRecorrencia
                                }
                            });
                        });

                        successCallback(eventos);

                    } catch (err) {
                        successCallback([]);
                    }
                }
            });
            calendar.render();
            window.calendar = calendar;

            // Carrega hoje na sidebar
            const hoje = dataLocalStr(new Date());
            dataSelecionadaGlobal = hoje;
            carregarEventosDia(hoje);

            setInterval(() => calendar.refetchEvents(), 30000);

            // ── MINI-CALENDÁRIO ──
            miniCalendarInstance = new FullCalendar.Calendar(miniEl, {
                initialView: 'dayGridMonth',
                locale: 'pt-br',
                height: "auto",
                headerToolbar: { left: 'prev,next', center: 'title', right: '' },
                showNonCurrentDates: false,
                fixedWeekCount: false,
                dateClick: function (info) {
                    const dataLocal = dataLocalStr(info.date);
                    dataSelecionadaGlobal = dataLocal;
                    calendar.gotoDate(dataLocal);
                    carregarEventosDia(dataLocal);
                    // Aguarda render antes de pintar
                    setTimeout(pintarDataSelecionada, 50);
                }
            });

            miniCalendarInstance.render();
            // Pinta o dia de hoje no mini-calendário após render
            setTimeout(pintarDataSelecionada, 100);

            // ── LEADS ──
            function carregarLeads() {
                fetch(`${API_BASE}/api/leads`)
                    .then(res => res.json())
                    .then(leads => {
                        const listaEl = document.getElementById("lista-leads");
                        const contador = document.getElementById("contador");
                        listaEl.innerHTML = "";

                        leads.forEach(lead => {
                            const div = document.createElement("div");
                            div.innerText = lead.nome;
                            div.style.cursor = "pointer";
                            div.onclick = () => {
                                document.getElementById("lead-nome").innerText = lead.nome;
                                document.getElementById("lead-telefone").innerText = "Telefone: " + lead.telefone;
                                document.getElementById("lead-email").innerText = "Email: " + lead.email;
                                document.getElementById("lead-mensagem").innerText = "Mensagem: " + lead.mensagem;
                                document.getElementById("lead-popup").classList.add("show");
                            };
                            listaEl.appendChild(div);
                        });

                        const total = leads.length;
                        document.title = total > 0 ? `Agenda (${total})` : "Agenda Profissional";
                        contador.innerText = `(${total})`;
                    })
                    .catch(() => { });
            }

            carregarLeads();
            setInterval(carregarLeads, 5000);

            // ── Onchange do select de repetição (delegado uma vez) ──
            document.getElementById("repeticao").addEventListener("change", function () {
                const dias = document.getElementById("dias-semana");
                if (this.value === "semanal" || this.value === "quinzenal") {
                    dias.classList.add("show");
                } else {
                    dias.classList.remove("show");
                }
            });

            // ── Menu lateral ──
            document.getElementById("menu-btn").addEventListener("click", () => {
                document.getElementById("menu-lateral").classList.toggle("show");
            });
        });

        // ─── AÇÕES DO MODAL ───────────────────────────────────────────────────────────

        function irPara(pagina) { window.location.href = pagina; }

        function fecharPopup() {
            document.getElementById("lead-popup").classList.remove("show");
        }

        function fecharModal() {
            document.getElementById("modal-consulta").classList.remove("show");
            document.getElementById("reagendamento-box").style.display = "none";
        }

        function reagendar() {
            document.getElementById("reagendamento-box").style.display = "block";
            gerarHorarios();
        }

        function gerarHorarios() {
            const select = document.getElementById("novaHora");
            select.innerHTML = "";
            for (let h = 8; h <= 23; h++) {
                const hora = String(h).padStart(2, "0");
                ["00", "30"].forEach(m => {
                    const op = document.createElement("option");
                    op.value = op.text = `${hora}:${m}`;
                    select.appendChild(op);
                });
            }
        }

        async function salvar() {

            // ───────── EVENTO ─────────
            if (window.modo === "evento") {

                const descricao = document.getElementById("modal-titulo").value.trim();
                const repeticao = document.getElementById("repeticao").value;
                const inicioBase = new Date(window.novaDataSelecionada);

                const grupoId = window.grupoIdAtual || Date.now();

                const inicio = new Date(
                    inicioBase.getFullYear(),
                    inicioBase.getMonth(),
                    inicioBase.getDate(),
                    inicioBase.getHours(),
                    inicioBase.getMinutes()
                );

                const fim = new Date(inicio.getTime() + 60 * 60 * 1000);

                function formatarLocal(date) {
                    const y = date.getFullYear();
                    const m = String(date.getMonth() + 1).padStart(2, "0");
                    const d = String(date.getDate()).padStart(2, "0");
                    const h = String(date.getHours()).padStart(2, "0");
                    const min = String(date.getMinutes()).padStart(2, "0");
                    return `${y}-${m}-${d}T${h}:${min}:00`;
                }

                const diasSemana = [...document.querySelectorAll("#dias-semana input:checked")]
                    .map(cb => parseInt(cb.value));

                await fetch(`${API_BASE}/api/eventos`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        descricao,
                        data: dataSelecionadaGlobal,
                        hora: inicioBase.toTimeString().slice(0, 5),
                        repeticao,
                        diasSemana,
                        grupoId
                    })
                });

                if (repeticao) {
                    salvarMetaGrupo(grupoId, repeticao, diasSemana);
                }
            }

            // ───────── CONSULTA ─────────
            else if (window.modo === "consulta") {

                // EDITAR
                if (window.consultaAtual) {

                    const observacao = document.getElementById("modal-titulo").value;

                    const res = await fetch(`${API_BASE}/api/consultas/${window.consultaAtual}`, {
                        method: "PUT",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            observacao: observacao
                        })
                    });

                    if (res.ok) {
                        mostrarToast("Consulta atualizada!", "success");
                        fecharModal();
                        window.calendar.refetchEvents();
                    }
                }

                // CRIAR
                else {

                    const pacienteId = 1;
                    const data = dataSelecionadaGlobal;
                    const hora = window.novaDataSelecionada.toTimeString().slice(0, 5);
                    const repeticao = document.getElementById("repeticao").value;

                    const grupoId = Date.now().toString();

                    console.log("FRONT grupoId:", grupoId);

                    const diasSemana = [...document.querySelectorAll("#dias-semana input:checked")]
                        .map(cb => parseInt(cb.value));

                    const res = await fetch(`${API_BASE}/api/consultas`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            pacienteId,
                            data,
                            hora,
                            repeticao,
                            grupoId
                        })
                    });

                    const consultaCriada = await res.json();

                    console.log("BACK grupoId (retorno):", consultaCriada.grupoRecorrencia);

                    salvarMetaGrupo(
                        String(consultaCriada.grupoRecorrencia),
                        repeticao || null,
                        diasSemana || []
                    );

                }
            }
        }
        async function salvarReagendamento() {
            const novaData = document.getElementById("novaData").value;
            const novaHora = document.getElementById("novaHora").value;

            if (!novaData || !novaHora) {
                mostrarToast("Preencha data e hora", "error");
                return;
            }

            const novaDataHora = `${novaData}T${novaHora}:00`;

            const res = await fetch(`${API_BASE}/api/consultas/${window.consultaAtual}`, {
                method: "PUT",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ dataHora: novaDataHora })
            });

            if (res.ok) {
                mostrarToast("Reagendado com sucesso!", "success");
                fecharModal();
                window.calendar.refetchEvents();
            } else {
                mostrarToast("Erro ao reagendar", "error");
            }
        }

        async function desmarcar() {
            const confirmar = await abrirConfirm();
            if (confirmar === null) return;

            // EVENTO
            if (window.modo === "evento") {

                if (confirmar) {
                    await fetch(
                        `${API_BASE}/api/eventos/grupo/${window.grupoIdAtual}`,
                        { method: "DELETE" }
                    );
                    mostrarToast("Todos os eventos removidos!", "success");

                } else {
                    await fetch(
                        `${API_BASE}/api/eventos/${window.eventoAtual}`,
                        { method: "DELETE" }
                    );
                    mostrarToast("Evento removido!", "success");
                }
            }

            // CONSULTA
            else if (window.modo === "consulta") {

                if (confirmar) {
                    await fetch(
                        `${API_BASE}/api/consultas/grupo/${window.grupoIdAtual}`,
                        { method: "DELETE" }
                    );
                    mostrarToast("Toda a série removida!", "success");

                } else {
                    await fetch(
                        `${API_BASE}/api/consultas/${window.consultaAtual}`,
                        { method: "DELETE" }
                    );
                    mostrarToast("Consulta removida!", "success");
                }
            }

            fecharModal();
            window.calendar.refetchEvents();
        }

        function abrirConfirm() {
            document.getElementById("modal-consulta").classList.remove("show");
            document.getElementById("confirm-modal").classList.add("show");

            return new Promise((resolve) => {
                respostaConfirmacao = (valor) => {
                    respostaConfirmacao = null;
                    resolve(valor);
                };
            });
        }

        function confirmarAcao(valor) {
            document.getElementById("confirm-modal").classList.remove("show");
            respostaConfirmacao(valor);
        }

        function fecharConfirm() {
            document.getElementById("confirm-modal").classList.remove("show");
            document.getElementById("modal-consulta").classList.add("show");
            respostaConfirmacao(null);
        }

    </script>

</body>
