<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Agenda Profissional</title>

    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css" rel="stylesheet">

    <style>
        /* BOTÃO ☰ */
        #menu-btn {
            font-size: 20px;
            cursor: pointer;
            margin-right: 10px;
        }

        /* MENU LATERAL */
        #menu-lateral {
            position: fixed;
            top: 0;
            left: -220px;
            width: 220px;
            height: 100%;
            background: #2c3e50;
            color: white;
            padding-top: 60px;
            transition: 0.3s;
            z-index: 9999;
        }

        /* MENU ABERTO */
        #menu-lateral.show {
            left: 0;
        }

        /* ITENS */
        #menu-lateral ul {
            list-style: none;
            padding: 0;
        }

        #menu-lateral li {
            padding: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            cursor: pointer;
        }

        #menu-lateral li:hover {
            background: #34495e;
        }

        /* FUNDO ESCURO */
        .popup {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;

            background: rgba(0, 0, 0, 0.4);

            display: flex;
            justify-content: center;
            align-items: center;

            opacity: 0;
            pointer-events: none;
            transition: 0.3s;

            z-index: 9999;
            /* 🔥 ESSENCIAL */
        }

        /* QUANDO ABRIR */
        .popup.show {
            opacity: 1;
            pointer-events: all;
        }

        /* CAIXA DO POPUP */
        .popup-content {
            background: white;
            padding: 25px;
            border-radius: 12px;
            width: 320px;
            max-width: 90%;

            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);

            text-align: left;
            animation: aparecer 0.25s ease;
        }

        /* TÍTULO */
        .popup-content h3 {
            margin-top: 0;
            color: #2c3e50;
        }

        /* TEXTOS */
        .popup-content p {
            margin: 8px 0;
            color: #555;
            font-size: 14px;
        }

        /* BOTÃO */
        .popup-content button {
            margin-top: 15px;
            width: 100%;
            padding: 10px;

            border: none;
            border-radius: 6px;

            background: #2c3e50;
            color: white;

            cursor: pointer;
            font-size: 14px;
        }

        /* HOVER */
        .popup-content button:hover {
            background: #1a252f;
        }

        /* ANIMAÇÃO */
        @keyframes aparecer {
            from {
                transform: scale(0.9);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        body {
            margin: 0;
            font-family: Arial;
            background: #f5f5f5;
            overflow: auto;
            background: #eef2f7;
        }

        .container {
            display: flex;
            min-height: calc(100vh - 60px);
            margin-top: 20px;
            padding: 05px;
            gap: 5px;
        }

        /* ESQUERDA */
        .sidebar-left {
            width: 260px;
            background: white;
            border-right: 1px solid #ddd;
            padding: 10px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            border-radius: 12px;
            margin-top: 10px;
            text-align: center;
        }

        /* MINI CALENDÁRIO */
        #miniCalendar {
            margin-top: 50px;
            font-size: 12px;
            width: 250px;
            height: 250px;
        }

        #lista-leads div {
            background: #f1f1f1;
            padding: 8px;
            margin-top: 5px;
            border-radius: 6px;
            font-size: 14px;
        }

        #contador {
            background: red;
            color: white;
            padding: 2px 6px;
            border-radius: 10px;
            font-size: 12px;
        }

        /* HEADER MINI */
        #miniCalendar .fc-toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        #miniCalendar .fc-toolbar-title {
            font-weight: 600;
            font-size: 20px;
        }

        #miniCalendar .fc-button {
            padding: 2px 6px !important;
            font-size: 12px !important;
        }

        /* NÃO ESTICAR */
        #miniCalendar .fc {
            height: 100% !important;
        }

        #miniCalendar .fc-daygrid-day-frame {
            height: 28px !important;
            background: #f9fafb !important;
        }

        /* ESCONDE DIAS DE OUTROS MESES (extra visual) */
        #miniCalendar .fc-day-other {
            display: none;
        }

        /* CENTRO */
        .main {
            flex: 1;
            padding: 10px;
            overflow: hidden;
        }

        #calendar {
            background: white;
            border-radius: 14px;
            padding: 05px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
        }

        /* DIREITA */
        .sidebar-right {
            width: 300px;
            background: white;
            border-left: 1px solid #ddd;
            padding: 15px;
            overflow-y: auto;
            border-radius: 12px;
            margin-top: 10px;
            text-align: center;
        }

        /* DATA */
        #dataSelecionada {
            text-align: center;
            margin-bottom: 15px;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
        }

        #dataSelecionada div:first-child {
            text-transform: capitalize;
            font-size: 18px;
            font-weight: bold;
        }

        #dataSelecionada div:last-child {
            font-size: 14px;
            color: #666;
        }

        /* EVENTOS */
        .evento {
            background: #f1f1f1;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 8px;
        }

        /* HORÁRIOS */
        .fc-timegrid-slot {
            height: 24px !important;
        }

        .fc-timegrid-axis {
            font-size: 15px;
        }

        .calendar-cell {
            position: relative;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .calendar-cell:hover {
            background-color: #eef5ea;
        }

        .calendar-cell:hover::after {
            content: "+";
            position: absolute;
            top: 5px;
            right: 8px;
            font-weight: bold;
            color: #809671;
        }

        .fc-timegrid-slot:hover {
            background: #e6f0ff !important;
            cursor: pointer;
        }

        .fc-event {
            text-align: center;
            border-radius: 10px !important;
            padding: 2px;
            font-size: 13px;
            border: none !important;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        .fc-event:hover {
            transform: scale(1.03);
        }


        #dias-semana.show {
            display: grid;
        }

        #dias-semana label {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #f8f9fa;
            padding: 8px;
            border-radius: 6px;
            cursor: pointer;
        }

        #dias-semana label:hover {
            background: #e9ecef;
        }

        #dias-semana input {
            width: auto;
        }

        #dias-semana {
            display: none;
            margin-top: 10px;
            flex-direction: column;
            gap: 10px;
        }

        #dias-semana.show {
            display: flex;
        }

        .header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: #2f3e4d;
            color: white;
            padding: 15px 20px;
            font-size: 18px;
            font-weight: 600;
            display: flex;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            z-index: 9998;
        }
    </style>
</head>

<body>

    <div class="header">
        <span id="menu-btn">☰</span>
        <span style="margin-left: 10px;">Agenda</span>
    </div>
    <!-- BOTÃO MENU -->
    <div id="menu-btn">☰</div>

    <!-- MENU LATERAL -->
    <div id="menu-lateral">
        <ul>
            <li onclick="irPara('leads.html')">Leads</li>
            <li onclick="irPara('pacientes.html')">Pacientes</li>
            <li onclick="irPara('agendar.html')">Agendar</li>
            <li onclick="irPara('editar.html')">Editar</li>
            <li onclick="irPara('relatorio.html')">Relatorio</li>
        </ul>
    </div>

    <div class="container">

        <!-- ESQUERDA -->
        <div class="sidebar-left">

            <div style="width:100%;">

                <!-- MINI CALENDÁRIO -->
                <div id="miniCalendar"></div>

                <!-- LEADS -->
                <h4 style="margin-top:20px;">
                    Leads <span id="contador">(0)</span>
                </h4>

                <div id="lista-leads"></div>

            </div>

        </div>

        <!-- CENTRO -->
        <div class="main">
            <div id="calendar"></div>
        </div>

        <!-- DIREITA -->
        <div class="sidebar-right">
            <div id="painel-dia">
                <h3 id="dataHoje"></h3>
                <div id="listaEventos"></div>
            </div>
        </div>

    </div>

    <div id="lead-popup" class="popup">
        <div class="popup-content">
            <h3 id="lead-nome"></h3>
            <p id="lead-telefone"></p>
            <p id="lead-email"></p>
            <p id="lead-mensagem"></p>

            <button onclick="fecharPopup()">Fechar</button>
        </div>
    </div>

    <div id="modal-consulta" class="popup">
        <div class="popup-content">

            <h3 id="modal-nome"></h3>
            <p id="modal-telefone"></p>
            <p id="modal-data"></p>

            <textarea id="modal-titulo" placeholder="Descricao do evento" style="
                width:100%;
                margin-top:10px;
                padding:8px;
                border-radius:6px;
                border:1px solid #ccc;">
            </textarea>


            <select id="repeticao" style="
                width:100%;
                margin-top:10px;
                padding:8px;
                border-radius:6px;
                border:1px solid #ccc;
            ">
                <option value="">Não repetir</option>
                <option value="semanal">Semanal</option>
                <option value="quinzenal">Quinzenal</option>
                <option value="mensal">Mensal</option>
            </select>

            <div id="dias-semana" style="margin-top:10px;">
                <label><input type="checkbox" value="1"> Seg</label>
                <label><input type="checkbox" value="2"> Ter</label>
                <label><input type="checkbox" value="3"> Qua</label>
                <label><input type="checkbox" value="4"> Qui</label>
                <label><input type="checkbox" value="5"> Sex</label>
            </div>

            <button onclick="salvar()">Salvar</button>


            <button onclick="desmarcar()">Desmarcar</button>
            <button onclick="reagendar()">Reagendar</button>

            <button onclick="fecharModal()">Fechar</button>

            <div id="reagendamento-box" style="display:none; margin-top:10px;">
                <label>Nova data</label>
                <input type="date" id="novaData">

                <label>Nova hora</label>
                <select id="novaHora"></select>

                <button onclick="salvar()">Salvar</button>
            </div>


        </div>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>

    <script>


        document.addEventListener('DOMContentLoaded', function () {

            const calendarEl = document.getElementById('calendar');
            const miniEl = document.getElementById('miniCalendar');

            const titulo = document.getElementById("dataHoje");
            const lista = document.getElementById("listaEventos");

            function formatarData(data) {
                const d = new Date(data);

                return {
                    diaSemana: d.toLocaleDateString('pt-BR', { weekday: 'long' }),
                    dataFormatada: d.toLocaleDateString('pt-BR', {
                        day: 'numeric',
                        month: 'long',
                        year: 'numeric'
                    })
                };
            }

            async function carregarEventosDia(data) {

                const response = await fetch(`http://localhost:8080/agenda/dia?data=${data}`);
                const eventos = await response.json();

                const titulo = document.getElementById("dataHoje");
                const lista = document.getElementById("listaEventos");

                const d = new Date(data);

                titulo.innerHTML = `
        <div>${d.toLocaleDateString('pt-BR', { weekday: 'long' })}</div>
        <div>${d.toLocaleDateString('pt-BR', {
                    day: 'numeric',
                    month: 'long',
                    year: 'numeric'
                })}</div>
    `;

                lista.innerHTML = "";

                if (!eventos || eventos.length === 0) {
                    lista.innerHTML = "<p>Nenhum compromisso</p>";
                    return;
                }

                // ORDENA
                eventos.sort((a, b) =>
                    new Date(a.inicio || a.dataHora) - new Date(b.inicio || b.dataHora)
                );

                eventos.forEach(e => {

                    const dataEvento = new Date(e.horario);

                    const hora = dataEvento.toLocaleTimeString('pt-BR', {
                        hour: '2-digit',
                        minute: '2-digit'
                    });

                    const div = document.createElement("div");
                    div.classList.add("evento");

                    if (e.tipo === "consulta") {
                        div.style.background = "#2ecc71"; // verde
                    } else {
                        div.style.background = "#3498db"; // azul
                    }

                    div.style.color = "#fff";

                    div.innerHTML = `<strong>${hora}</strong><br>${e.descricao || "Sem descrição"}`;

                    lista.appendChild(div);
                });
            }

            // CALENDÁRIO PRINCIPAL
            const calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'timeGridWeek',
                locale: 'pt-br',

                height: '100%',
                expandRows: true,

                headerToolbar: {
                    left: 'prev,next today',
                    center: 'title',
                    right: ''
                },

                slotMinTime: "08:00:00",
                slotMaxTime: "24:00:00",
                allDaySlot: false,

                dateClick: function (info) {

                    carregarEventosDia(info.dateStr);

                    const dataObj = new Date(info.date);

                    const dataFormatada = dataObj.toLocaleDateString("pt-BR", {
                        day: "2-digit",
                        month: "2-digit",
                        year: "numeric"
                    });

                    const horaFormatada = dataObj.toLocaleTimeString("pt-BR", {
                        hour: "2-digit",
                        minute: "2-digit"
                    });

                    document.getElementById("modal-data").innerText =
                        `${dataFormatada} às ${horaFormatada}`;

                    document.getElementById("modal-nome").innerText = "Novo Evento";

                    document.getElementById("modal-consulta").classList.add("show");

                    // salva a data selecionada
                    window.novaDataSelecionada = info.date;

                    // define correto
                    window.modo = "evento";

                    document.getElementById("modal-titulo").value = "";
                    document.getElementById("repeticao").value = "";

                    const diasBox = document.getElementById("dias-semana");
                    if (diasBox) diasBox.classList.remove("show");

                    const repeticao = document.getElementById("repeticao");

                    const dias = document.getElementById("dias-semana");

                    repeticao.onchange = function () {

                        console.log("mudou:", this.value);

                        if (this.value === "semanal" || this.value === "quinzenal") {
                            dias.classList.add("show");
                        } else {
                            dias.classList.remove("show");
                        }

                    };

                    const checkboxes = document.querySelectorAll("#dias-semana input");
                    checkboxes.forEach(cb => cb.checked = false);

                },
                // EVENTOS (COM DADOS EXTRAS)
                events: async function (fetchInfo, successCallback) {

                    const resConsultas = await fetch("http://localhost:8080/api/consultas");
                    const consultas = await resConsultas.json();

                    const resEventos = await fetch("http://localhost:8080/api/eventos");
                    const eventosApi = await resEventos.json();

                    let eventos = [];

                    // CONSULTAS
                    consultas.forEach(c => {

                        const inicio = new Date(c.dataHora);
                        const fim = new Date(inicio.getTime() + 60 * 60 * 1000);

                        eventos.push({
                            id: c.id,
                            title: c.paciente?.nome || "Paciente",
                            start: inicio,
                            end: fim,
                            color: "#2ecc71",
                            extendedProps: {
                                tipo: "consulta",
                                id: c.id
                            }
                        });

                    });

                    // EVENTOS
                    eventosApi.forEach(e => {
                        eventos.push({
                            id: e.id,
                            title: e.descricao,
                            start: new Date(e.inicio),
                            end: new Date(e.fim),
                            color: "#3498db",
                            extendedProps: {
                                tipo: "evento",
                                grupoId: e.grupoId
                            }
                        });
                    });

                    successCallback(eventos);
                },

                // CLIQUE NO EVENTO
                eventClick: async function (info) {

                    const evento = info.event;

                    // EVENTO
                    if (evento.extendedProps.tipo === "evento") {

                        document.getElementById("modal-nome").innerText = "Evento";

                        document.getElementById("modal-telefone").innerText = "";

                        document.getElementById("modal-data").innerText =
                            new Date(evento.start).toLocaleString("pt-BR");

                        document.getElementById("modal-titulo").value =
                            evento.title;

                        window.modo = "evento";
                        window.novaDataSelecionada = evento.start;

                        window.eventoAtual = evento.id;

                        window.grupoIdAtual = evento.extendedProps.grupoId;

                        document.getElementById("modal-consulta").classList.add("show");


                        const repeticao = document.getElementById("repeticao");
                        const dias = document.getElementById("dias-semana");

                        repeticao.onchange = function () {
                            console.log("mudou:", this.value);

                            if (this.value === "semanal" || this.value === "quinzenal") {
                                dias.classList.add("show");
                            } else {
                                dias.classList.remove("show");
                            }
                        };

                        return;
                    }

                    // CONSULTA
                    const response = await fetch("http://localhost:8080/api/consultas");
                    const consultas = await response.json();

                    const consulta = consultas.find(c => c.id === evento.extendedProps.id);

                    document.getElementById("modal-nome").innerText =
                        "Paciente: " + (consulta.paciente?.nome || "Sem nome");

                    document.getElementById("modal-telefone").innerText =
                        "Telefone: " + (consulta.paciente?.telefone || "-");

                    document.getElementById("modal-data").innerText =
                        "Data: " + new Date(consulta.dataHora).toLocaleString("pt-BR");

                    document.getElementById("modal-titulo").value =
                        consulta.observacao || "";

                    window.consultaAtual = consulta.id;

                    window.modo = "consulta";

                    document.getElementById("modal-consulta").classList.add("show");
                }
            });

            calendar.render();
            window.calendar = calendar;
            const hoje = new Date().toISOString().split("T")[0];
            carregarEventosDia(hoje);

            setInterval(() => {
                calendar.refetchEvents();
            }, 10000);

            // MINI CALENDÁRIO FINAL
            const miniCalendar = new FullCalendar.Calendar(miniEl, {
                initialView: 'dayGridMonth',
                locale: 'pt-br',
                height: "auto",

                headerToolbar: {
                    left: 'prev,next',
                    center: 'title',
                    right: ''
                },

                showNonCurrentDates: false,
                fixedWeekCount: false,

                dateClick: function (info) {
                    calendar.gotoDate(info.dateStr);
                    carregarEventosDia(info.dateStr);
                }
            });

            miniCalendar.render();

            let leads = [];

            function adicionarLead(nome) {
                leads.push(nome);
                atualizarLeads();
            }

            function irPara(pagina) {
                window.location.href = pagina
            }



            function atualizarLeads() {

                const lista = document.getElementById("lista-leads");
                const contador = document.getElementById("contador");
                const contadorTopo = document.getElementById("contador-topo"); // 🔥 NOVO

                lista.innerHTML = "";

                leads.forEach(lead => {

                    const div = document.createElement("div");

                    div.innerText = lead.nome;

                    div.style.cursor = "pointer";

                    div.onclick = () => {

                        document.getElementById("lead-nome").innerText = lead.nome;
                        document.getElementById("lead-telefone").innerText = "Telefone: " + lead.telefone;
                        document.getElementById("lead-email").innerText = "Email: " + lead.email;
                        document.getElementById("lead-mensagem").innerText = "Mensagem: " + lead.mensagem;

                        document.getElementById("lead-popup").classList.add("show");
                    };

                    lista.appendChild(div);
                });

                const total = leads.length;

                document.title = total > 0
                    ? "Agenda Profissional (" + total + ")"
                    : "Agenda Profissional";

                contador.innerText = "(" + total + ")";
                if (contadorTopo) {
                    contadorTopo.innerText = "(" + total + ")";
                }
            }

            function carregarLeads() {

                fetch("http://localhost:8080/api/leads")
                    .then(res => res.json())
                    .then(data => {

                        leads = data; // 🔥 substitui lista fake

                        atualizarLeads();
                    });
            }



            carregarLeads();
            setInterval(carregarLeads, 5000);

        });

        function fecharPopup() {
            document.getElementById("lead-popup").classList.remove("show");
        }

        const menuBtn = document.getElementById("menu-btn")
        const menu = document.getElementById("menu-lateral")

        menuBtn.addEventListener("click", () => {
            menu.classList.toggle("show")
        })

        function irPara(pagina) {
            window.location.href = pagina;
        }

        function fecharModal() {
            document.getElementById("modal-consulta").classList.remove("show");

            document.getElementById("reagendamento-box").style.display = "none";
        }

        function reagendar() {

            const box = document.getElementById("reagendamento-box")

            box.style.display = "block"

            const hoje = new Date();


            document.getElementById("novaHora").value = "09:00"
        }
        function editar() {
            alert("Aqui você pode editar observações");
        }

        async function salvarEdicao() {

            const observacao = document.getElementById("modal-titulo").value;

            await fetch(`http://localhost:8080/api/consultas/${window.consultaAtual}`, {
                method: "PUT",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    observacao: observacao
                })
            });

            alert("Observação salva!");
            fecharModal();
        }

        async function salvarReagendamento() {

            const novaData = document.getElementById("novaData").value
            const novaHora = document.getElementById("novaHora").value

            const novaDataHora = novaData + "T" + novaHora + ":00"

            const res = await fetch(`http://localhost:8080/api/consultas/${window.consultaAtual}`, {
                method: "PUT",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    dataHora: novaDataHora
                })
            })

            if (res.ok) {

                alert("Reagendado!")

                fecharModal()

                // atualiza eventos do calendário
                window.calendar.refetchEvents()

            } else {
                alert("Erro ao reagendar")
            }
        }


        function gerarHorarios() {

            const select = document.getElementById("novaHora")

            select.innerHTML = ""

            for (let h = 8; h <= 23; h++) {

                const hora = String(h).padStart(2, "0")

                const opcao1 = document.createElement("option")
                opcao1.value = `${hora}:00`
                opcao1.text = `${hora}:00`

                const opcao2 = document.createElement("option")
                opcao2.value = `${hora}:30`
                opcao2.text = `${hora}:30`

                select.appendChild(opcao1)
                select.appendChild(opcao2)
            }
        }

        async function salvar() {

            const grupoId = Date.now();

            if (window.modo === "evento") {

                const titulo = document.getElementById("modal-titulo").value;
                const repeticao = document.getElementById("repeticao").value;

                const inicioBase = new Date(window.novaDataSelecionada);

                const checkboxes = document.querySelectorAll("#dias-semana input:checked");
                let diasSelecionados = [];

                checkboxes.forEach(cb => {
                    diasSelecionados.push(parseInt(cb.value));
                });

                const limite = new Date(inicioBase);
                limite.setMonth(limite.getMonth() + 3);

                let eventosParaCriar = [];

                if (!repeticao) {
                    eventosParaCriar.push(inicioBase);
                }

                if (repeticao === "semanal") {

                    let data = new Date(inicioBase);

                    while (data <= limite) {

                        diasSelecionados.forEach(dia => {

                            let nova = new Date(data);

                            let diff = dia - nova.getDay();
                            if (diff < 0) diff += 7;

                            nova.setDate(nova.getDate() + diff);

                            if (nova <= limite) {
                                eventosParaCriar.push(new Date(nova));
                            }
                        });

                        data.setDate(data.getDate() + 7);
                    }
                }

                if (repeticao === "quinzenal") {

                    let data = new Date(inicioBase);
                    const diaSemanaOriginal = inicioBase.getDay();

                    while (data <= limite) {

                        let nova = new Date(data);

                        // garante mesmo dia da semana
                        let diff = diaSemanaOriginal - nova.getDay();
                        nova.setDate(nova.getDate() + diff);

                        if (nova <= limite) {
                            eventosParaCriar.push(new Date(nova));
                        }

                        // avança 14 dias exatos
                        data.setDate(data.getDate() + 14);
                    }
                }

                if (repeticao === "mensal") {

                    let data = new Date(inicioBase);

                    while (data <= limite) {

                        let nova = new Date(data);

                        // garante mesma hora original
                        nova.setHours(inicioBase.getHours());
                        nova.setMinutes(inicioBase.getMinutes());

                        if (nova <= limite) {
                            eventosParaCriar.push(new Date(nova));
                        }

                        // avança 1 mês SEM quebrar data
                        data = new Date(
                            data.getFullYear(),
                            data.getMonth() + 1,
                            inicioBase.getDate(),
                            inicioBase.getHours(),
                            inicioBase.getMinutes()
                        );
                    }
                }
                for (let data of eventosParaCriar) {

                    const inicio = new Date(data);
                    const fim = new Date(inicio.getTime() + 60 * 60 * 1000);

                    await fetch("http://localhost:8080/api/eventos", {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify({
                            descricao: titulo,
                            inicio: inicio.toLocaleString("sv-SE").replace(" ", "T"),
                            fim: fim.toLocaleString("sv-SE").replace(" ", "T"),
                            grupoId: grupoId
                        })
                    });
                }

                alert("Evento(s) criado(s)!");

                fecharModal();
                window.calendar.refetchEvents();

                window.eventoAtual = null;

            } else {

                await salvarEdicao();
                window.calendar.refetchEvents();
            }
        }


        async function desmarcar() {

            const confirmar = confirm("Deseja remover todos da série?\nOK = todos | Cancelar = apenas este");

            console.log("grupoIdAtual:", window.grupoIdAtual);

            // TODOS DA SÉRIE
            if (confirmar === true && window.grupoIdAtual != null) {

                await fetch(`http://localhost:8080/api/eventos/grupo/${window.grupoIdAtual}`, {
                    method: "DELETE"
                });

                alert("Eventos da série removidos!");
            }

            // APENAS UM EVENTO
            else if (window.modo === "evento" && window.eventoAtual) {

                await fetch(`http://localhost:8080/api/eventos/${window.eventoAtual}`, {
                    method: "DELETE"
                });

                alert("Evento removido!");
            }

            // CONSULTA
            else if (window.modo === "consulta") {

                await fetch(`http://localhost:8080/api/consultas/${window.consultaAtual}`, {
                    method: "DELETE"
                });

                alert("Consulta removida!");
            }

            fecharModal();
            window.calendar.refetchEvents();
        }

        function formatarDataHoje() {
            const hoje = new Date();

            return hoje.toLocaleDateString("pt-BR", {
                weekday: "long",
                day: "2-digit",
                month: "long"
            });
        }







    </script>
