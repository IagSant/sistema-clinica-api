<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Pacientes</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #f5f5f5;
        }

        header {
            background: #2c3e50;
            color: white;
            padding: 15px 20px;
        }

        .container {
            padding: 20px;
        }

        .topo {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            gap: 10px;
        }

        .controls {
            display: flex;
            gap: 10px;
        }

        input,
        select {
            padding: 8px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        .lista {
            background: white;
            padding: 10px;
            border-radius: 10px;
        }

        .paciente {
            padding: 10px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
        }

        .paciente:hover {
            background: #f1f1f1;
        }

        .btn-voltar {
            display: inline-block;
            margin-bottom: 15px;
            padding: 10px 15px;
            background: #2c3e50;
            color: white;
            text-decoration: none;
            border-radius: 6px;
        }

        .btn-voltar:hover {
            background: #1a252f;
        }

        .modal-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);

            display: none;
            justify-content: center;
            align-items: center;
        }

        .modal-container.show {
            display: flex;
        }

        .modal-box {
            background: #fff;
            padding: 30px;
            width: 450px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            text-align: center;
        }

        .modal-box h2 {
            margin-bottom: 20px;
            color: #2c3e50;
        }

        .form-group {
            text-align: left;
            margin-bottom: 15px;
        }

        .form-group label {
            font-size: 14px;
            font-weight: 600;
            color: #555;
            display: block;
            margin-bottom: 5px;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            outline: none;
            font-size: 14px;
            box-sizing: border-box;
        }

        .form-group textarea {
            resize: none;
            height: 80px;
        }

        .btn {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 8px;
            margin-top: 10px;
            font-size: 14px;
            cursor: pointer;
        }

        .btn.salvar {
            background: #27ae60;
            color: white;
        }

        .btn.fechar {
            background: #2c3e50;
            color: white;
        }

        .consulta {
            background: #f1f1f1;
            padding: 8px;
            margin-top: 5px;
            border-radius: 6px;
            text-align: left;
        }

        .sem-historico {
            color: #888;
            font-size: 14px;
        }

        * {
            box-sizing: border-box;
        }

        #toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #2c3e50;
            color: white;
            padding: 12px 18px;
            margin: 30px;
            border-radius: 8px;
            opacity: 0;
            transform: translateY(-10px);
            transition: 0.3s;
            z-index: 9999;
            font-size: 14px;
        }

        #toast.show {
            opacity: 1;
            transform: translateY(0);
        }

        #toast.success {
            background: #27ae60;
        }

        #toast.error {
            background: #e74c3c;
        }

        .control-item {
            height: 38px;
            padding: 0 12px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 14px;
            display: flex;
            align-items: center;
        }

        .controls {
            display: flex;
            gap: 10px;
            align-items: center;
        }
    </style>
</head>

<body>

    <header>👤 Pacientes</header>

    <div class="container">

        <div class="topo">

            <a href="agenda.html" class="btn-voltar">← Voltar para Agenda</a>

            <div class="controls">
                <button onclick="novoPaciente()" class="control-item"
                    style="background:#27ae60; color:white; border:none; padding:10px 15px; border-radius:6px; cursor:pointer;">
                    + Inserir Paciente
                </button>

                <input type="text" id="busca" placeholder="🔍 Buscar" class="control-item">

                <select id="filtro" class="control-item">
                    <option value="nome-asc">Nome A-Z</option>
                    <option value="nome-desc">Nome Z-A</option>
                    <option value="data-asc">Data ↑</option>
                    <option value="data-desc">Data ↓</option>
                </select>
            </div>

        </div>

        <div class="lista" id="lista-pacientes"></div>

    </div>

    <!-- MODAL -->

    <div class="modal-container" id="modal">
        <div class="modal-box">
            <h2>🧠 Ficha do Paciente</h2>

            <div class="form-group">
                <label>Nome</label>
                <input id="nome" type="text" placeholder="Nome e Sobrenome">
            </div>

            <div class="form-group">
                <label>Telefone</label>
                <input id="telefone" type="text" placeholder="+55 41 99999-9999">
            </div>

            <div class="form-group">
                <label>Email</label>
                <input id="email" type="email" placeholder="paciente@email.com">
            </div>

            <div class="form-group">
                <label>Observações</label>
                <textarea id="observacoes" placeholder="Insira as observaçoes do seu paciente"></textarea>
            </div>

            <button class="btn salvar" onclick="salvar()">Salvar</button>

            <h3>Histórico</h3>
            <div id="historico">
                <p class="sem-historico">Nenhum registro ainda</p>
            </div>

            <button class="btn fechar" onclick="fechar()">Fechar</button>
        </div>
    </div>

    <script>

        let pacientes = []
        let pacienteSelecionado = null

        async function carregarPacientes() {
            const res = await fetch("http://localhost:8080/api/pacientes")
            pacientes = await res.json()
            renderizar()
        }

        function renderizar() {

            const lista = document.getElementById("lista-pacientes")
            const busca = document.getElementById("busca").value.toLowerCase()
            const filtro = document.getElementById("filtro").value

            let filtrados = pacientes.filter(p =>
                (p.nome || "").toLowerCase().includes(busca)
            )

            if (filtro === "nome-asc") filtrados.sort((a, b) => a.nome.localeCompare(b.nome))
            if (filtro === "nome-desc") filtrados.sort((a, b) => b.nome.localeCompare(a.nome))
            if (filtro === "data-asc") filtrados.sort((a, b) => new Date(a.dataCriacao) - new Date(b.dataCriacao))
            if (filtro === "data-desc") filtrados.sort((a, b) => new Date(b.dataCriacao) - new Date(a.dataCriacao))

            lista.innerHTML = ""

            filtrados.forEach(p => {
                const div = document.createElement("div")
                div.classList.add("paciente")
                div.innerText = p.nome
                div.onclick = () => abrirFicha(p)
                lista.appendChild(div)
            })
        }

        function abrirFicha(p) {
            pacienteSelecionado = p

            document.getElementById("nome").value = p.nome
            document.getElementById("telefone").value = p.telefone || ""
            document.getElementById("email").value = p.email || ""
            document.getElementById("observacoes").value = p.observacoes || ""

            carregarHistorico(p.id)

            document.getElementById("modal").classList.add("show")
        }

        async function carregarHistorico(id) {
            const res = await fetch(`http://localhost:8080/api/consultas/paciente/${id}`)
            const consultas = await res.json()

            const historico = document.getElementById("historico")
            historico.innerHTML = ""

            consultas.forEach(c => {
                const div = document.createElement("div")
                div.classList.add("consulta")

                const data = new Date(c.dataHora).toLocaleString("pt-BR")

                div.innerHTML = `${data} - ${c.status}`
                historico.appendChild(div)
            })
        }

        async function salvar() {

            const dados = {
                nome: document.getElementById("nome").value,
                telefone: document.getElementById("telefone").value,
                email: document.getElementById("email").value,
                observacoes: document.getElementById("observacoes").value
            }

            if (pacienteSelecionado) {
                await fetch(`http://localhost:8080/api/pacientes/${pacienteSelecionado.id}`, {
                    method: "PUT",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(dados)
                })
                mostrarToast("Paciente atualizado!", "success")
            } else {
                await fetch(`http://localhost:8080/api/pacientes`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(dados)
                })
                mostrarToast("Paciente cadastrado!", "success")
            }

            fechar()
            carregarPacientes()
        }

        function fechar() {
            document.getElementById("modal").classList.remove("show")
        }

        function novoPaciente() {
            pacienteSelecionado = null

            document.getElementById("nome").value = ""
            document.getElementById("telefone").value = ""
            document.getElementById("email").value = ""
            document.getElementById("observacoes").value = ""

            document.getElementById("historico").innerHTML = "<i>Novo paciente</i>"

            document.getElementById("modal").classList.add("show")
        }

        document.getElementById("busca").addEventListener("input", renderizar)
        document.getElementById("filtro").addEventListener("change", renderizar)

        document.getElementById("modal").addEventListener("click", function (e) {
            if (e.target.id === "modal") {
                fechar();
            }
        });

        carregarPacientes()

        function formatarTelefone(input) {
            let valor = input.value

            // Permite só números, espaço e +
            valor = valor.replace(/[^0-9+\s]/g, "")

            // Limite geral
            if (valor.length > 18) valor = valor.slice(0, 18)

            input.value = valor
        }

        function mostrarToast(mensagem, tipo = "success") {
            const toast = document.getElementById("toast")

            toast.innerText = mensagem
            toast.className = `show ${tipo}`

            setTimeout(() => {
                toast.className = ""
            }, 3000)
        }
    </script>


    <div id="toast"></div>

</body>

</html>
