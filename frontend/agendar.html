<!DOCTYPE html>

<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Agendar Consulta</title>

</head>

<style>
    body {
        margin: 0;
        font-family: Arial;
        background: #f5f5f5;
    }

    header {
        background: #2c3e50;
        color: white;
        padding: 15px 20px;
        font-size: 18px;
    }

    .container {
        padding: 20px;
    }

    .form-box {
        background: white;
        padding: 20px;
        border-radius: 10px;
        max-width: 500px;
        margin: 0 auto;
        /* centraliza só o form */
    }

    form {
        background: white;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
    }

    .autocomplete {
        position: relative;
    }

    #sugestoes {
        background: white;
        border: 1px solid #ccc;
        border-radius: 6px;

        position: absolute;
        top: 100%;
        left: 0;
        width: 100%;

        max-height: 150px;
        overflow-y: auto;

        display: none;
        z-index: 1000;
    }

    #sugestoes div {
        padding: 8px;
        cursor: pointer;
    }

    #sugestoes div:hover {
        background: #f1f1f1;
    }

    input,
    select {
        width: 100%;
        padding: 10px;
        margin-top: 10px;
        margin-bottom: 15px;
        border-radius: 6px;
        border: 1px solid #ccc;
        font-size: 14px;
    }

    * {
        box-sizing: border-box;
    }

    button {
        width: 100%;
        padding: 12px;
        border: none;
        background: #2c3e50;
        color: white;
        border-radius: 6px;
        font-size: 15px;
        cursor: pointer;
    }

    button:hover {
        background: #1a252f;
    }

    .btn-voltar {
        display: inline-block;
        margin-bottom: 15px;
        padding: 10px 15px;
        background: #2c3e50;
        color: white;
        text-decoration: none;
        border-radius: 6px;
    }

    .sucesso {
        margin-top: 15px;
        color: green;
        font-weight: bold;
    }

    .erro {
        margin-top: 15px;
        color: red;
        font-weight: bold;
    }

    .dias-container {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
        margin-top: 10px;
    }

    .dias-container label {
        display: flex;
        align-items: center;
        gap: 8px;
        background: #f8f9fa;
        padding: 8px;
        border-radius: 6px;
        cursor: pointer;
        transition: 0.2s;
    }

    .dias-container label:hover {
        background: #e9ecef;
    }

    .dias-container input {
        width: auto;
    }
</style>


</head>

<body>


    <header>
        📅 Agendar Consulta
    </header>

    <div class="container">


        <a href="agenda.html" class="btn-voltar">← Voltar para Agenda</a>

        <form id="formAgendar" class="form-box">

            <div class="autocomplete">

                <label>Nome do paciente</label>
                <input type="text" id="nomePaciente" placeholder="Nome do paciente" autocomplete="off">

                <div id="sugestoes"></div>

            </div>

            <label>Telefone</label>
            <input type="text" id="telefone">

            <label>Data</label>
            <input type="date" id="data" required>

            <label>Hora</label>
            <select id="hora" required></select>

            <label>Repetição</label>
            <select id="repeticao">
                <option value="nenhum">Nenhum</option>
                <option value="semanal">Semanal</option>
                <option value="quinzenal">Quinzenal</option>
                <option value="mensal">Mensal</option>
            </select>

            <div id="diasSemana" class="dias-container">
                <label><input type="checkbox" value="1"> Seg</label>
                <label><input type="checkbox" value="2"> Ter</label>
                <label><input type="checkbox" value="3"> Qua</label>
                <label><input type="checkbox" value="4"> Qui</label>
                <label><input type="checkbox" value="5"> Sex</label>
            </div>

            <button type="button" onclick="agendar()">Agendar</button>

            <div id="mensagem"></div>

        </form>

    </div>

    <script>

        const form = document.getElementById("formAgendar")
        const mensagem = document.getElementById("mensagem")

        // AUTOCOMPLETE (FORA DO SUBMIT)
        let pacientes = []

        async function carregarPacientes() {
            const res = await fetch("http://localhost:8080/api/pacientes")
            pacientes = await res.json()
        }

        const input = document.getElementById("nomePaciente")
        const box = document.getElementById("sugestoes")

        input.addEventListener("focus", () => {

            box.innerHTML = ""

            pacientes.forEach(p => {

                const div = document.createElement("div")
                div.innerText = p.nome

                div.onclick = () => {
                    input.value = p.nome
                    input.dataset.id = p.id

                    // 🔥 NOVO: preencher telefone
                    document.getElementById("telefone").value = p.telefone || ""

                    box.style.display = "none"
                }

                box.appendChild(div)
            })

            box.style.display = pacientes.length ? "block" : "none"
        })
        document.addEventListener("click", (e) => {
            if (!e.target.closest(".autocomplete")) {
                box.style.display = "none"
            }
        })

        // CARREGA PACIENTES AO ABRIR A PÁGINA
        carregarPacientes()


        // SUBMIT


        function gerarHorarios() {
            const select = document.getElementById("hora")

            select.innerHTML = ""

            for (let h = 8; h <= 23; h++) {
                for (let m of ["00", "30"]) {

                    const horaFormatada =
                        String(h).padStart(2, "0") + ":" + m

                    const option = document.createElement("option")
                    option.value = horaFormatada
                    option.textContent = horaFormatada

                    select.appendChild(option)
                }
            }
        }

        // chama quando carregar a página
        gerarHorarios()

        function getDiasSelecionados() { // pegar os dias selecionados
            const checkboxes = document.querySelectorAll('#diasSemana input:checked');
            return Array.from(checkboxes).map(cb => parseInt(cb.value));
        }

        const dados = {
            pacienteId: 1,
            psicologoId: 2,
            data: "2026-04-10",
            hora: "14:00",
            repeticao: document.getElementById("repeticao").value,
            diasSemana: getDiasSelecionados()
        };

        async function agendar() {

            const pacienteId = document.getElementById("nomePaciente").dataset.id;

            const data = document.getElementById("data").value;
            const hora = document.getElementById("hora").value;
            const repeticao = document.getElementById("repeticao").value;

            const dias = [];
            document.querySelectorAll("#diasSemana input:checked")
                .forEach(cb => dias.push(parseInt(cb.value)));

            if (!pacienteId) {
                alert("Selecione um paciente!");
                return;
            }

            if (
                (repeticao === "semanal" || repeticao === "quinzenal") &&
                dias.length === 0
            ) {
                alert("Selecione pelo menos um dia da semana!");
                return;
            }

            const dados = {
                pacienteId: pacienteId,
                data: data,
                hora: hora,
                repeticao: repeticao,
                diasSemana: dias
            };

            console.log(dados);

            await fetch("http://localhost:8080/api/agendar-recorrente", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(dados)
            });

            alert("Agendado com sucesso 🚀");
        }

        const repeticaoSelect = document.getElementById("repeticao");
        const diasDiv = document.getElementById("diasSemana");

        repeticaoSelect.addEventListener("change", () => {

            if (
                repeticaoSelect.value === "semanal" ||
                repeticaoSelect.value === "quinzenal"
            ) {
                diasDiv.style.display = "block";
            } else {
                diasDiv.style.display = "none";
            }

        });

        // iniciar escondido
        diasDiv.style.display = "none";

















    </script>


</body>

</html>
