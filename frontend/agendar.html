<!DOCTYPE html>

<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Agendar Consulta</title>

</head>

<style>
    body {
        margin: 0;
        font-family: Arial;
        background: #f5f5f5;
    }

    header {
        background: #2c3e50;
        color: white;
        padding: 15px 20px;
        font-size: 18px;
    }

    .container {
        padding: 20px;
    }

    .form-box {
        background: white;
        padding: 20px;
        border-radius: 10px;
        max-width: 500px;
        margin: 0 auto;
        /* centraliza só o form */
    }

    form {
        background: white;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
    }

    .autocomplete {
        position: relative;
    }

    #sugestoes {
        background: white;
        border: 1px solid #ccc;
        border-radius: 6px;

        position: absolute;
        top: 100%;
        left: 0;
        width: 100%;

        max-height: 150px;
        overflow-y: auto;

        display: none;
        z-index: 1000;
    }

    #sugestoes div {
        padding: 8px;
        cursor: pointer;
    }

    #sugestoes div:hover {
        background: #f1f1f1;
    }

    input,
    select {
        width: 100%;
        padding: 10px;
        margin-top: 10px;
        margin-bottom: 15px;
        border-radius: 6px;
        border: 1px solid #ccc;
        font-size: 14px;
    }

    * {
        box-sizing: border-box;
    }

    button {
        width: 100%;
        padding: 12px;
        border: none;
        background: #2c3e50;
        color: white;
        border-radius: 6px;
        font-size: 15px;
        cursor: pointer;
    }

    button:hover {
        background: #1a252f;
    }

    .btn-voltar {
        display: inline-block;
        margin-bottom: 15px;
        padding: 10px 15px;
        background: #2c3e50;
        color: white;
        text-decoration: none;
        border-radius: 6px;
    }

    .sucesso {
        margin-top: 15px;
        color: green;
        font-weight: bold;
    }

    .erro {
        margin-top: 15px;
        color: red;
        font-weight: bold;
    }

    .dias-container {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
        margin-top: 10px;
    }

    .dias-container label {
        display: flex;
        align-items: center;
        gap: 8px;
        background: #f8f9fa;
        padding: 8px;
        border-radius: 6px;
        cursor: pointer;
        transition: 0.2s;
    }

    .dias-container label:hover {
        background: #e9ecef;
    }

    .dias-container input {
        width: auto;
    }

    .autocomplete {
        position: relative;
    }

    .autocomplete #sugestoes {
        position: absolute;
        top: calc(100% - 15px);
        left: 0;
        width: 100%;
    }

    #toast {
        position: fixed;
        bottom: 20px;
        right: 20px;
        background: #2c3e50;
        color: white;
        padding: 12px 18px;
        margin: 30px;
        border-radius: 8px;
        opacity: 0;
        transform: translateY(-10px);
        transition: 0.3s;
        z-index: 9999;
        font-size: 14px;
    }

    #toast.show {
        opacity: 1;
        transform: translateY(0);
    }

    #toast.success {
        background: #27ae60;
    }

    #toast.error {
        background: #e74c3c;
    }
</style>


</head>

<body>


    <header>
        📅 Agendar Consulta
    </header>

    <div class="container">


        <a href="agenda.html" class="btn-voltar">← Voltar para Agenda</a>

        <form id="formAgendar" class="form-box">

            <div class="autocomplete">

                <label>Nome do paciente</label>
                <input type="text" id="nomePaciente" placeholder="Nome do paciente" autocomplete="off">

                <div id="sugestoes"></div>

            </div>

            <label>Telefone</label>
            <input type="text" id="telefone">

            <label>Data</label>
            <input type="date" id="data" required>

            <label>Hora</label>
            <select id="hora" required></select>

            <label>Repetição</label>
            <select id="repeticao">
                <option value="nenhum">Nenhum</option>
                <option value="semanal">Semanal</option>
                <option value="quinzenal">Quinzenal</option>
                <option value="mensal">Mensal</option>
            </select>


            <button type="button" onclick="agendar()">Agendar</button>

            <div id="mensagem"></div>

        </form>

    </div>

    <script>

        const form = document.getElementById("formAgendar")

        // AUTOCOMPLETE
        let pacientes = []

        async function carregarPacientes() {
            try {
                const res = await fetch("http://localhost:8080/api/pacientes");

                if (!res.ok) {
                    throw new Error("Erro na API");
                }

                pacientes = await res.json();

            } catch (e) {
                console.error("Erro ao carregar pacientes:", e);
            }
        }

        const input = document.getElementById("nomePaciente")
        const box = document.getElementById("sugestoes")

        input.addEventListener("input", () => {

            const valor = input.value.toLowerCase();
            box.innerHTML = "";

            const filtrados = pacientes.filter(p =>
                p.nome.toLowerCase().includes(valor)
            );

            filtrados.forEach(p => {
                const div = document.createElement("div");
                div.innerText = p.nome;

                div.onclick = () => {
                    input.value = p.nome;
                    input.dataset.id = p.id;

                    document.getElementById("telefone").value = p.telefone || "";

                    box.style.display = "none";
                };

                box.appendChild(div);
            });

            box.style.display = filtrados.length ? "block" : "none";
        });

        input.addEventListener("focus", () => {
            input.dispatchEvent(new Event("input"));
        });

        window.onload = async () => {
            await carregarPacientes();
            gerarHorarios();
        };

        // GERAR HORÁRIOS
        function gerarHorarios() {
            const select = document.getElementById("hora")
            select.innerHTML = ""

            for (let h = 8; h <= 23; h++) {
                for (let m of ["00", "30"]) {

                    const horaFormatada =
                        String(h).padStart(2, "0") + ":" + m

                    const option = document.createElement("option")
                    option.value = horaFormatada
                    option.textContent = horaFormatada

                    select.appendChild(option)
                }
            }
        }

        function getDiaSemana(dataString) {
            const data = new Date(dataString + "T00:00:00");
            return data.getDay();
        }

        // AGENDAR
        async function agendar() {

            const nomeInput = document.getElementById("nomePaciente");
            let pacienteId = nomeInput.dataset.id;

            const data = document.getElementById("data").value;
            const hora = document.getElementById("hora").value;
            const repeticao = document.getElementById("repeticao").value;

            // 🔥 GARANTE O ID MESMO SEM CLICK
            if (!pacienteId) {
                const nomeDigitado = nomeInput.value.toLowerCase();

                const pacienteEncontrado = pacientes.find(p =>
                    p.nome.toLowerCase() === nomeDigitado
                );

                if (pacienteEncontrado) {
                    pacienteId = pacienteEncontrado.id;
                    nomeInput.dataset.id = pacienteId;
                }
            }

            // validações
            if (!pacienteId) {
                mostrarToast("Selecione um paciente!", "error");
                return;
            }

            if (!data) {
                mostrarToast("Selecione uma data!", "error");
                return;
            }

            // 🔥 VOLTA AQUI (ESSA PARTE SUMIU NO SEU CÓDIGO)
            const diaSemana = getDiaSemana(data);

            const dados = {
                pacienteId: Number(pacienteId),
                data: data,
                hora: hora,
                repeticao: repeticao,
                diasSemana: repeticao !== "nenhum" ? [diaSemana] : []
            };

            console.log("ENVIANDO:", dados);

            try {
                const res = await fetch("http://localhost:8080/api/consultas", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(dados)
                });

                if (!res.ok) {
                    const erro = await res.text();
                    console.error(erro);
                    mostrarToast("Erro ao agendar ❌", "error");
                    return;
                }

                mostrarToast("Consulta agendada com sucesso ✔", "success");

                form.reset();
                nomeInput.dataset.id = "";

            } catch (e) {
                console.error(e);
                mostrarToast("Erro de conexão ❌", "error");
            }
        }

        // FECHAR AUTOCOMPLETE
        document.addEventListener("click", (e) => {
            const autocomplete = document.querySelector(".autocomplete");

            if (!autocomplete.contains(e.target)) {
                box.style.display = "none";
            }
        });

        // TOAST
        function mostrarToast(mensagem, tipo = "success") {
            const toast = document.getElementById("toast")

            toast.innerText = mensagem
            toast.className = `show ${tipo}`

            setTimeout(() => {
                toast.className = ""
            }, 3000)
        }

    </script>

    <div id="toast"></div>
</body>

</html>
