<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Confirmação Atendimento</title>

    <link rel="icon" href="/logo.png">

    <style>
        body {
            font-family: sans-serif;
            background: #efeee7;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
            text-align: center;
        }

        .card {
            background: #cadbb7;
            padding: 25px;
            border-radius: 12px;
            width: 320px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .logo {
            max-width: 140px;
            height: auto;
            display: block;
            margin: 0 auto 20px;
        }

        h2 {
            margin-top: 0;
            color: #485935;
        }

        .info {
            margin: 10px 0;
            color: #555;
        }

        .btn {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
        }

        .confirmar {
            background: #485935;
            color: #fff;
        }

        .cancelar {
            background: #e0e0e0;
            color: #333;
        }

        /* POPUP */
        .popup {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.4);

            display: flex;
            justify-content: center;
            align-items: center;

            opacity: 0;
            pointer-events: none;
            transition: 0.3s;
        }

        .popup.show {
            opacity: 1;
            pointer-events: all;
        }

        .popup-content {
            background: white;
            padding: 30px;
            border-radius: 12px;
            text-align: center;
            animation: scaleIn 0.3s ease;
        }

        .check {
            font-size: 50px;
            color: #4CAF50;
            animation: pop 0.4s ease;
        }

        @keyframes pop {
            0% { transform: scale(0); }
            80% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        @keyframes scaleIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        /* LOADER */
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #fff;
            border-radius: 50%;
            width: 14px;
            height: 14px;
            animation: spin 1s linear infinite;
            display: inline-block;
            margin-left: 8px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

    </style>
</head>

<body>

<div class="card">

    <img src="/logo.png" class="logo">

    <h2>Confirmação de Atendimento</h2>

    <p id="nome" class="info"></p>
    <p id="data" class="info"></p>

    <button class="btn confirmar" onclick="confirmar()">
        Confirmar agenda
    </button>

    <button class="btn cancelar" onclick="cancelar()">
        Cancelar agenda
    </button>

</div>

<!-- POPUP -->
<div id="popup" class="popup">
    <div class="popup-content">
        <div class="check">✔</div>
        <h2 id="popup-text">Confirmado</h2>
    </div>
</div>

<script>

    const urlParams = new URLSearchParams(window.location.search);
    const id = urlParams.get("id");

    if (!id) {
        document.body.innerHTML = "ID não informado";
        throw new Error("Sem ID");
    }

    // BUSCAR DADOS
    fetch(`/api/consulta?id=${id}`)
.then(res => res.json())
.then(data => {

    document.getElementById("nome").innerText =
        "Nome: " + (data.paciente ? data.paciente.nome : "Sem paciente");

    const d = new Date(data.dataHora.replace("T", " "));

    const dataFinal =
        d.toLocaleDateString("pt-BR") +
        " às " +
        d.toLocaleTimeString("pt-BR", {
            hour: "2-digit",
            minute: "2-digit"
        });

    document.getElementById("data").innerText = "Data: " + dataFinal;

    // 🔥 NOVO: trava botões conforme status
    if (data.status === "CONFIRMADO") {
        const btnConfirmar = document.querySelector(".confirmar");
        const btnCancelar = document.querySelector(".cancelar");

        btnConfirmar.disabled = true;
        btnConfirmar.innerText = "Já confirmado ✔";
        btnConfirmar.style.background = "#4CAF50";

        btnCancelar.disabled = true;
        btnCancelar.style.opacity = "0.5";
    }

    if (data.status === "CANCELADO") {

    const btnConfirmar = document.querySelector(".confirmar");
    const btnCancelar = document.querySelector(".cancelar");

    btnCancelar.disabled = true;
    btnCancelar.innerText = "Já cancelado ❌";

    // 🔥 CONFIRMAR CONTINUA LIBERADO
    btnConfirmar.disabled = false;
}

});

    // POPUP
    function mostrarPopup(texto) {
        const popup = document.getElementById("popup");
        const textoEl = document.getElementById("popup-text");

        textoEl.innerText = texto;

        popup.classList.add("show");

        setTimeout(() => {
            popup.classList.remove("show");
        }, 2000);
    }

    // CONFIRMAR
    function confirmar() {
    const btnConfirmar = document.querySelector(".confirmar");
    const btnCancelar = document.querySelector(".cancelar");

    btnConfirmar.disabled = true;
    btnConfirmar.innerHTML = 'Confirmando <span class="loader"></span>';

    fetch(`/api/confirmar?id=${id}`, { method: "POST" })
    .then(() => {

        btnConfirmar.innerHTML = "Confirmado ✔";
        btnConfirmar.style.background = "#4CAF50";

        // 🔒 BLOQUEIA CANCELAR
        btnCancelar.disabled = true;
        btnCancelar.style.opacity = "0.5";

        mostrarPopup("Consulta confirmada ✅");
    });
}

    // CANCELAR
    function cancelar() {
    const btnConfirmar = document.querySelector(".confirmar");
    const btnCancelar = document.querySelector(".cancelar");

    btnCancelar.disabled = true;
    btnCancelar.innerHTML = 'Cancelando <span class="loader"></span>';

    fetch(`/api/cancelar?id=${id}`, { method: "POST" })
    .then(() => {

        btnCancelar.innerHTML = "Cancelado ❌";
        btnCancelar.style.background = "#999";

        // 🔥 PERMITE CONFIRMAR DE NOVO
        btnConfirmar.disabled = false;
        btnConfirmar.innerText = "Confirmar agenda";
        btnConfirmar.style.background = "#485935";

        mostrarPopup("Consulta cancelada ❌");
    });
}

</script>

</body>
</html>
